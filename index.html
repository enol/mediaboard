<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MediaBoard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0ede8; --bg2:#e8e4de; --card-bg:#fff;
    --text:#1a1a1a; --text-muted:#888;
    --accent:#e63946; --accent2:#457b9d;
    --border:#d5d0c9; --divider:#e8e4de;
    --shadow:0 2px 12px rgba(0,0,0,.10); --shadow-lg:0 8px 32px rgba(0,0,0,.16);
    --tw:108px; --th:161px; --gap:10px;
    --cols:5;
    --col-w:calc(var(--cols)*var(--tw) + (var(--cols) - 1)*var(--gap) + 2*14px);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); min-height:100vh; }

  /* TOPBAR */
  #topbar {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    background:#1a1a1a; border-bottom:2px solid var(--accent);
    display:flex; flex-direction:column;
  }
  #topbar-main {
    display:flex; align-items:center; gap:10px;
    padding:0 16px; height:52px; white-space:nowrap; overflow:hidden;
  }
  #topbar h1 { font-family:'Bebas Neue',sans-serif; font-size:26px; color:#fff; letter-spacing:2px; flex-shrink:0; }
  #topbar-controls {
    display:flex; align-items:center; gap:8px; flex-wrap:nowrap;
    overflow:hidden; flex:1;
  }
  /* Hamburger for small screens */
  #topbar-menu-btn {
    display:none; background:none; border:none; color:#aaa;
    font-size:20px; cursor:pointer; padding:4px 6px; margin-left:auto; flex-shrink:0;
  }
  /* Drawer for small screens */
  #topbar-drawer {
    display:none; flex-direction:column; gap:8px;
    background:#1a1a1a; padding:10px 16px 14px;
    border-top:1px solid #2a2a2a;
  }
  #topbar-drawer.open { display:flex; }
  .drawer-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  #topbar label { color:#aaa; font-size:12px; flex-shrink:0; }
  #zoom-slider { -webkit-appearance:none; width:100px; height:4px; border-radius:2px; background:#444; outline:none; cursor:pointer; flex-shrink:0; }
  #zoom-slider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--accent); cursor:pointer; }
  #zoom-val { color:#aaa; font-size:11px; min-width:34px; flex-shrink:0; }
  .topbar-key-btn {
    background:#2a2a2a; border:1px solid #555; color:#ccc; font-size:11px;
    padding:5px 10px; border-radius:4px; cursor:pointer; font-family:'DM Sans',sans-serif;
    display:flex; align-items:center; gap:5px; transition:background .15s; flex-shrink:0;
  }
  .topbar-key-btn:hover { background:#383838; }
  .topbar-key-btn .dot { width:7px; height:7px; border-radius:50%; background:#555; flex-shrink:0; }
  .topbar-key-btn.active .dot { background:#4caf50; }
  .topbar-btn { background:var(--accent); color:#fff; border:none; padding:6px 12px; border-radius:4px; font-size:12px; font-family:'DM Sans',sans-serif; font-weight:600; cursor:pointer; flex-shrink:0; transition:background .2s; }
  .topbar-btn:hover { background:#c1121f; }
  .topbar-btn.secondary { background:#2a2a2a; border:1px solid #444; }
  .topbar-btn.secondary:hover { background:#3a3a3a; }
  /* Responsive breakpoint */
  @media (max-width:900px){
    #topbar-controls { display:none; }
    #topbar-menu-btn { display:block; }
  }
  @media (min-width:901px){
    #topbar-drawer { display:none !important; }
  }

  /* CANVAS — Figma-style infinite pan/zoom */
  #canvas-viewport {
    position:fixed; inset:0; overflow:hidden;
    cursor:default;
  }
  #canvas-viewport.panning { cursor:grab; }
  #canvas-viewport.panning-active { cursor:grabbing !important; }
  #canvas-wrapper {
    position:absolute; top:0; left:0;
    padding:120px 60px 200px;
    transform-origin:0 0;
    -webkit-transform-origin:0 0;
    will-change:transform;
    user-select:none;
    -webkit-user-select:none;
  }
  #columns-container { display:flex; gap:24px; align-items:flex-start; min-height:80vh; }
  #add-col-btn {
    width:160px; min-width:160px; height:100px; border:2px dashed var(--border); border-radius:10px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text-muted); font-size:24px; background:rgba(255,255,255,.5);
    transition:all .15s; flex-shrink:0; align-self:flex-start; margin-top:32px;
  }
  #add-col-btn:hover { border-color:var(--accent); background:#fff5f5; color:var(--accent); }
  #add-col-btn small { font-size:11px; margin-top:4px; font-weight:600; }

  /* COLUMN */
  .genre-column { width:var(--col-w); min-width:var(--col-w); flex-shrink:0; position:relative; }
  .genre-column.dragging-col { opacity:.4; pointer-events:none; }
  .col-header { display:flex; align-items:center; justify-content:space-between; padding:0 2px 8px; user-select:none; }
  .col-title-row { display:flex; align-items:center; gap:4px; height:24px; }
  .col-drag-handle { color:var(--text-muted); font-size:16px; cursor:grab; padding:4px 6px; user-select:none; line-height:1; touch-action:none; }
  .col-drag-handle:hover { color:var(--text); }
  /* Vertical drop line between columns */
  .col-drop-line { position:fixed !important; width:4px !important; background:#000 !important; opacity:.55 !important; border-radius:2px !important; pointer-events:none !important; z-index:9999 !important; animation:none !important; }
  .col-title { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:2px; color:var(--text-muted); cursor:default; line-height:1; display:flex; align-items:center; }
  .col-rename-btn { background:none; border:none; color:var(--text-muted); font-size:11px; cursor:pointer; padding:1px 4px; border-radius:3px; opacity:0; transition:opacity .15s; line-height:1; }
  .col-title-row:hover .col-rename-btn { opacity:1; }
  .col-rename-btn:hover { background:var(--bg2); color:var(--text); }
  .col-delete-btn { background:none; border:none; color:var(--text-muted); font-size:16px; cursor:pointer; padding:2px 6px; border-radius:4px; transition:color .15s; }
  .col-delete-btn:hover { color:var(--accent); }

  /* COMBINED CARD */
  .combined-card { background:var(--card-bg); border-radius:10px; box-shadow:var(--shadow); border:1px solid var(--border); overflow:hidden; }
  .top10-section { padding:16px 14px 20px; }
  .top10-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; color:var(--text); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .top10-title .badge { background:var(--accent); color:#fff; font-size:10px; padding:2px 7px; border-radius:3px; letter-spacing:1px; font-family:'DM Sans',sans-serif; font-weight:700; }
  .card-divider { height:2px; background:#c8c3bb; margin:0; }
  .genre-section { padding:0 14px 16px; border-radius:0 0 10px 10px; transition:background .2s; }
  .genre-section:first-of-type { padding-top:14px; }
  .sec-header { padding-top:14px; }
  .genre-section-title { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:1px; color:var(--text-muted); margin-bottom:10px; }

  /* Card grid — strict 5-col, add-btn always on its own row */
  .card-row { display:flex; gap:var(--gap); flex-wrap:nowrap; align-items:flex-start; overflow:visible; }
  .card-row + .card-row { margin-top:var(--gap); }
  /* The add-btn row is always a separate element with just the + */
  .add-row { margin-top:var(--gap); }


  /* Inline delete overlay */
  .delete-overlay { position:absolute; inset:0; background:rgba(220,30,30,.55); border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; z-index:20; }
  .delete-ov-label { color:#fff; font-size:10px; font-weight:700; letter-spacing:.3px; text-shadow:0 1px 3px rgba(0,0,0,.5); }
  .delete-ov-yes { background:#fff; color:#e63946; border:1.5px solid #e63946; border-radius:4px; padding:3px 12px; font-size:10px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; width:44px; }
  .delete-ov-yes:hover { background:#fff0f1; }
  .delete-ov-no  { background:#1a1a1a; color:#fff; border:none; border-radius:4px; padding:3px 12px; font-size:10px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; width:44px; }
  .delete-ov-no:hover { background:#333; }
  /* DROP LINE */
  .drop-line { width:3px; height:var(--th); border-radius:99px; background:rgba(0,0,0,.6); flex-shrink:0; pointer-events:none; align-self:center; }
  @keyframes pulse-line { from{opacity:.7} to{opacity:1} }

  /* MEDIA CARD */
  .media-card { position:relative; width:var(--tw); flex-shrink:0; cursor:grab; user-select:none; }
  .media-card.dragging { opacity:.35; cursor:grabbing; }
  .media-card.pending { opacity:.5; }
  .card-img-wrap { position:relative; width:var(--tw); height:var(--th); }
  .card-img-wrap img { width:100%; height:100%; object-fit:cover; border-radius:6px; display:block; background:var(--bg2); }
  .rank-num { position:absolute; bottom:4px; left:5px; font-family:'Bebas Neue',sans-serif; font-size:40px; color:rgba(255,255,255,.92); text-shadow:0 2px 10px rgba(0,0,0,.8),0 0 2px rgba(0,0,0,.6); line-height:1; pointer-events:none; z-index:2; }
  .pending-label { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; font-size:9px; font-weight:700; color:#1a1a1a; background:rgba(255,255,255,.88); padding:3px 7px; border-radius:4px; letter-spacing:.5px; pointer-events:none; white-space:nowrap; }
  .media-card .card-info { margin-top:6px; }
  .media-card .card-title { font-size:13px; font-weight:700; line-height:1.3; color:var(--text); word-break:break-word; white-space:normal; }
  .media-card .card-meta { font-size:12px; color:var(--text); font-weight:400; margin-bottom:4px; }

  /* Platform pills */
  .card-platforms { display:flex; flex-wrap:wrap; gap:2px; align-items:center; width:var(--tw); overflow:hidden; }
  .platform-pill { display:inline-flex; align-items:center; gap:2px; background:#f2efea; border:1px solid var(--border); border-radius:3px; padding:1px 4px; font-size:9px; font-weight:600; color:#555; cursor:pointer; transition:background .1s; max-width:calc(var(--tw) - 4px); overflow:hidden; flex-shrink:1; min-width:0; }
  .platform-pill img { width:11px; height:11px; object-fit:contain; flex-shrink:0; }
  .platform-pill span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .platform-pill:hover { background:#e8e4de; }
  .add-platform-pill { display:inline-flex; align-items:center; background:none; border:1px dashed var(--border); border-radius:3px; padding:1px 5px; font-size:9px; color:var(--text-muted); cursor:pointer; transition:border-color .1s,color .1s; }
  .add-platform-pill:hover { border-color:var(--accent2); color:var(--accent2); }
  .pending-btn { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:50%; background:#ddd; cursor:pointer; border:none; flex-shrink:0; padding:0; transition:background .15s; }
  .pending-btn:hover { background:#bbb; }
  .pending-btn.active { background:#aaa; }
  .pending-btn svg { width:10px; height:10px; display:block; }

  /* Delete btn */
  .media-card .delete-btn { position:absolute; top:-6px; right:-6px; width:20px; height:20px; background:#fff; border:1.5px solid var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; color:#333; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.18); transition:background .15s,color .15s; z-index:10; }
  .media-card .delete-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* Add card */
  .add-card { width:var(--tw); height:var(--th); border:2px dashed var(--border); border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; color:var(--text-muted); font-size:20px; flex-shrink:0; transition:border-color .15s,background .15s; user-select:none; }
  .add-card:hover { border-color:var(--accent); background:#fff5f5; color:var(--accent); }
  .add-card span { font-size:9px; margin-top:3px; font-weight:600; }

  /* MODALS */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:2000; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal-box { background:#fff; border-radius:12px; padding:24px; width:100%; max-width:440px; box-shadow:var(--shadow-lg); animation:modalIn .18s ease; position:relative; }
  @keyframes modalIn { from{transform:scale(.92);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-box h2 { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; margin-bottom:14px; }
  .modal-close-x { position:absolute; top:14px; right:16px; background:none; border:none; font-size:20px; color:var(--text-muted); cursor:pointer; }
  .modal-close-x:hover { color:var(--text); }
  .modal-input { width:100%; border:1.5px solid var(--border); border-radius:6px; padding:9px 12px; font-size:14px; font-family:'DM Sans',sans-serif; outline:none; }
  .modal-input:focus { border-color:var(--accent2); }
  .search-results { margin-top:10px; max-height:280px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
  .search-result-item { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:6px; border:1.5px solid var(--border); cursor:pointer; transition:background .1s,border-color .1s; }
  .search-result-item:hover { background:#f5f0eb; border-color:var(--accent2); }
  .search-result-item img { width:36px; height:54px; object-fit:cover; border-radius:4px; background:var(--bg2); flex-shrink:0; }
  .result-title { font-weight:600; font-size:13px; }
  .result-meta { font-size:11px; color:var(--text-muted); }
  .streaming-picker { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .streaming-option { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:6px 8px; border-radius:6px; border:2px solid transparent; transition:border-color .15s,background .15s; }
  .streaming-option.selected { border-color:var(--accent2); background:#f0f6ff; }
  .streaming-option img { width:28px; height:28px; object-fit:contain; border-radius:4px; }
  .streaming-option span { font-size:9px; font-weight:600; color:var(--text-muted); text-align:center; }
  .modal-actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }
  .btn-primary { background:var(--accent); color:#fff; border:none; padding:8px 20px; border-radius:6px; font-size:13px; font-family:'DM Sans',sans-serif; font-weight:700; cursor:pointer; }
  .btn-primary:hover { background:#c1121f; }
  .btn-secondary { background:#1a1a1a; color:#fff; border:none; padding:8px 20px; border-radius:6px; font-size:13px; font-family:'DM Sans',sans-serif; font-weight:700; cursor:pointer; }
  .btn-secondary:hover { background:#333; }
  .btn-cancel { background:none; border:1.5px solid var(--border); color:var(--text); padding:8px 16px; border-radius:6px; font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; }
  .btn-cancel:hover { background:var(--bg2); }
  .confirm-modal { text-align:center; }
  .confirm-modal p { margin-bottom:16px; font-size:15px; }
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin-left:8px; vertical-align:middle; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .no-results { color:var(--text-muted); font-size:13px; text-align:center; padding:12px 0; }
  .key-modal-hint { font-size:12px; color:var(--text-muted); margin-top:6px; line-height:1.5; }
  .key-modal-hint a { color:var(--accent2); }

  /* FILTER BAR */
  #filter-bar { position:fixed; top:52px; /* adjusted by JS */ left:0; right:0; z-index:999; background:#1a1a1a; border-bottom:1px solid #2a2a2a; padding:6px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; min-height:40px; }
  .filter-group { display:flex; align-items:center; gap:5px; }
  .filter-icon { display:flex; align-items:center; flex-shrink:0; opacity:.85; }

  .filter-toggle-btn {
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 10px; border-radius:20px; font-size:11px;
    font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .15s;
    border:1.5px solid #444; background:#2a2a2a; color:#888; flex-shrink:0;
  }
  .filter-toggle-btn.on  { border-color:#4caf50; color:#4caf50; background:#1a2a1a; }
  .filter-toggle-btn.off { border-color:#444;    color:#666;    background:#2a2a2a; }
  .filter-toggle-btn:hover { border-color:#777; color:#ccc; }

  .filter-chip {
    background:#2a2a2a; color:#aaa; border:1px solid #3a3a3a;
    padding:3px 10px; border-radius:20px; font-size:11px; font-family:'DM Sans',sans-serif;
    cursor:pointer; transition:all .15s; white-space:nowrap;
  }
  .filter-chip:hover { background:#333; color:#ddd; }
  .filter-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .filter-clear {
    background:#fff; color:var(--accent); border:1.5px solid var(--accent);
    padding:3px 12px; border-radius:20px; font-size:11px; font-family:'DM Sans',sans-serif;
    font-weight:700; cursor:pointer; transition:all .15s; margin-left:auto; white-space:nowrap;
  }
  .filter-clear:hover { background:#fff0f1; }
  /* Dimmed cards when filter active */
  .media-card.filter-dim { opacity:.10; pointer-events:none; }



  /* Supabase sync indicator */
  .sync-status { display:flex; align-items:center; gap:5px; flex-shrink:0; margin-left:6px; }
  .sync-dot { width:8px; height:8px; border-radius:50%; background:#555; flex-shrink:0; transition:background .3s; }
  .sync-dot.synced  { background:#4caf50; }
  .sync-dot.syncing { background:#f59e0b; animation:pulse-sync .8s ease-in-out infinite alternate; }
  .sync-dot.error   { background:#e63946; }
  #sync-label { color:#888; font-size:11px; }
  @keyframes pulse-sync { from{opacity:.5} to{opacity:1} }

  /* Key modal steps */
  .key-steps { margin-bottom:16px; display:flex; flex-direction:column; }
  .key-step {
    font-size:12px; color:#333; line-height:1.6;
    display:flex; gap:12px; align-items:flex-start;
    padding:10px 0; border-bottom:1px solid #eee; text-align:left;
  }
  .key-step:last-child { border-bottom:none; }
  .key-step-num {
    background:var(--accent); color:#fff; border-radius:50%;
    width:20px; height:20px; min-width:20px;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; flex-shrink:0; margin-top:2px;
  }
  .key-step-body { flex:1; }
  .key-step a { color:var(--accent2); text-decoration:underline; }
  .key-step code { background:#f0ede8; padding:1px 6px; border-radius:3px; font-size:11px; font-family:monospace; }
  .key-field-label { display:block; font-size:11px; font-weight:700; color:var(--text-muted); margin-bottom:5px; letter-spacing:.5px; text-transform:uppercase; }
  .key-field-label + .modal-input { margin-bottom:10px; }
  .key-visible { font-family:monospace; font-size:12px; letter-spacing:.3px; }
  /* Wide modal for key setup — no scroll */
  .modal-box.wide { max-width:600px; }
  .modal-box { max-height:none; overflow-y:visible; }


  /* Section color picker */
  .color-picker-row { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
  .color-swatch {
    width:24px; height:24px; border-radius:50%; cursor:pointer;
    border:2px solid transparent; transition:transform .15s, border-color .15s;
    flex-shrink:0; box-shadow:0 1px 4px rgba(0,0,0,.15);
  }
  .color-swatch:hover { transform:scale(1.15); }
  .color-swatch.selected { border-color:#1a1a1a; transform:scale(1.1); }
  .color-swatch.none-swatch {
    background: linear-gradient(135deg, #fff 45%, #e63946 45%, #e63946 55%, #fff 55%);
    border:1.5px solid #ddd;
  }


  /* Repo config modal */
  .repo-tabs { display:flex; gap:0; margin-bottom:20px; border-bottom:2px solid var(--border); }
  .repo-tab {
    padding:8px 20px; font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif;
    cursor:pointer; border:none; background:none; color:var(--text-muted);
    border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s;
  }
  .repo-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .repo-tab-content { display:none; }
  .repo-tab-content.active { display:block; }
  .repo-section-title { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; margin-bottom:12px; color:var(--text); }
  .sql-block {
    background:#1a1a1a; color:#a8ff78; font-family:monospace; font-size:11px;
    padding:12px 14px; border-radius:6px; margin:8px 0 12px;
    white-space:pre; overflow-x:auto; line-height:1.6;
  }
  .copy-btn {
    background:#2a2a2a; color:#aaa; border:1px solid #444; border-radius:4px;
    padding:3px 10px; font-size:11px; cursor:pointer; font-family:'DM Sans',sans-serif;
    transition:background .15s; float:right; margin-top:-4px;
  }
  .copy-btn:hover { background:#3a3a3a; color:#fff; }


  /* Card context menu */
  .card-menu-btn {
    position:absolute; bottom:6px; right:5px; z-index:10;
    width:24px; height:18px; background:rgba(0,0,0,.55); border:none;
    border-radius:4px; cursor:pointer; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:3px; padding:2px 4px;
    opacity:.45; transition:opacity .15s, background .15s;
  }
  .card-menu-btn span { display:block; width:13px; height:1.5px; background:#fff; border-radius:1px; }
  .card-menu-btn:hover, .media-card:hover .card-menu-btn { opacity:1; background:rgba(0,0,0,.82); }
  .card-context-menu {
    position:fixed; z-index:3000; background:#1a1a1a; border:1px solid #333;
    border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,.4); min-width:160px;
    overflow:hidden;
  }
  .card-ctx-item {
    display:flex; align-items:center; gap:8px; padding:9px 14px;
    color:#ddd; font-size:12px; font-family:'DM Sans',sans-serif;
    cursor:pointer; transition:background .1s; user-select:none;
  }
  .card-ctx-item:hover { background:#2a2a2a; color:#fff; }
  .card-ctx-item .ctx-icon { font-size:13px; width:16px; text-align:center; flex-shrink:0; }

  .move-option {
    padding:9px 12px; font-size:12px; border-radius:6px; cursor:pointer;
    border:1px solid var(--border); margin-bottom:4px; color:var(--text);
    transition:background .1s, border-color .1s;
    font-family:'DM Sans',sans-serif;
  }
  .move-option:hover { background:#f5f0eb; border-color:var(--accent2); }

  .card-ctx-sep { height:1px; background:#2a2a2a; margin:2px 0; }
  .card-ctx-submenu { background:#222; padding:4px 0; }
  .card-ctx-sub-item { padding:7px 14px 7px 38px; color:#aaa; font-size:11px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:background .1s; }
  .card-ctx-sub-item:hover { background:#2a2a2a; color:#fff; }


  /* Rating overlay on card */
  .card-rating {
    position:absolute; top:6px; left:6px; z-index:3;
    background:rgba(0,0,0,.78); color:#fff;
    font-size:13px; font-weight:700; font-family:'DM Sans',sans-serif;
    padding:3px 8px; border-radius:5px;
    display:flex; align-items:center; gap:4px;
    line-height:1;
  }
  .card-rating svg { flex-shrink:0; width:13px; height:13px; }


  /* Multi-section support */
  .sec-header { display:flex; align-items:center; gap:6px; justify-content:space-between; margin-bottom:10px; user-select:none; }
  .sec-drag-handle { color:var(--text-muted); font-size:12px; cursor:grab; padding:2px 2px; flex-shrink:0; }
  .sec-title { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:1px; color:var(--text-muted); }
  .sec-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; }
  .genre-section:hover .sec-actions { opacity:1; }
  .sec-rename-btn, .sec-delete-btn { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:12px; padding:2px 5px; border-radius:3px; }
  .sec-rename-btn:hover { color:var(--text); background:var(--bg2); }
  .sec-delete-btn:hover { color:var(--accent); }
  .sec-divider { height:2px; background:#c8c3bb; margin:0; display:block; width:100%; }
  .genre-section.sec-drop-target { outline:2px dashed var(--accent2); outline-offset:-2px; border-radius:4px; }
  .add-section-row { padding:10px 14px 14px; }
  .add-section-btn {
    width:100%; padding:7px; border:2px dashed var(--border); border-radius:6px;
    background:none; color:var(--text-muted); font-size:11px; font-weight:600;
    font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .15s;
    letter-spacing:.3px;
  }
  .add-section-btn:hover { border-color:var(--accent); color:var(--accent); background:#fff5f5; }



  /* GAME CARD extras */
  .hltb-times { display:flex; flex-direction:column; gap:1px; margin-top:3px; }
  .hltb-row { display:flex; justify-content:space-between; align-items:center; font-size:9px; line-height:1.4; }
  .hltb-label { color:var(--text-muted); }
  .hltb-val { font-weight:700; color:var(--text); }
  .card-type-badge { display:inline-block; font-size:8px; font-weight:700; letter-spacing:.5px; padding:1px 5px; border-radius:3px; margin-bottom:3px; background:#1a1a1a; color:#fff; }
  .card-type-badge.game { background:#2d6a4f; }


  /* ── NAV MODE BUTTON (touch only) ──────────────────────────── */
  #nav-mode-btn {
    display: none; /* hidden on desktop */
    position: fixed;
    bottom: 24px; right: 20px;
    z-index: 2000;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #1a1a1a;
    border: none;
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
    cursor: pointer;
    align-items: center; justify-content: center;
    transition: background .2s, transform .15s;
    -webkit-tap-highlight-color: transparent;
  }
  #nav-mode-btn.nav-active {
    background: var(--accent);
    transform: scale(1.08);
  }
  #nav-mode-btn svg { pointer-events: none; }

  /* Nav mode — one finger pans canvas */
  #canvas-viewport.nav-mode { cursor: grab; }
  #canvas-viewport.nav-mode.panning-active { cursor: grabbing; }
  /* Nav mode overlay — blocks card interactions */
  #nav-overlay {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 500;
    cursor: grab;
  }
  #canvas-viewport.nav-mode #nav-overlay { display: block; }

  /* Nav mode hint toast */
  #nav-hint {
    display: none;
    position: fixed;
    bottom: 88px; right: 20px;
    background: rgba(0,0,0,.75);
    color: #fff;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 6px 12px;
    border-radius: 20px;
    pointer-events: none;
    z-index: 1999;
    white-space: nowrap;
  }

  /* ── TIZEN / TV CONTROLS ────────────────────────────────────── */
  #tv-controls {
    display: none;
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 2000;
    gap: 4px;
    flex-direction: column;
    align-items: center;
  }
  .tv-ctrl-row { display: flex; gap: 4px; }
  .tv-btn {
    width: 40px; height: 40px;
    background: rgba(0,0,0,.7);
    border: 1px solid #444;
    border-radius: 8px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .tv-btn:hover, .tv-btn:focus { background: var(--accent); outline: none; }
  .tv-zoom-row { display: flex; gap: 4px; margin-top: 4px; }

  /* ── CROSS-BROWSER FIXES ────────────────────────────────────── */
  /* Safari iOS — prevent bounce on canvas */
  #canvas-viewport { -webkit-overflow-scrolling: touch; }
  /* Firefox — hide scrollbar */
  * { scrollbar-width: thin; scrollbar-color: var(--border) var(--bg2); }
  /* Tizen — remove transitions that cause lag */
  .tizen-detected * { transition: none !important; }
  .tizen-detected #canvas-wrapper { will-change: auto !important; }

  @media (hover:none) and (pointer:coarse) {
    #nav-mode-btn { display: flex; }
    #nav-hint { display: block; opacity: 0; transition: opacity .3s; }
    #nav-hint.visible { opacity: 1; }
  }

  /* ══════════════════════════════════════════════
     MOBILE / TOUCH RESPONSIVE — Phase 1
     ══════════════════════════════════════════════ */

  /* Detect touch device — show hidden buttons always */
  @media (hover:none) and (pointer:coarse) {

    /* Delete button always visible on touch */
    .media-card .delete-btn {
      opacity:1 !important;
      top:-5px; right:-5px;
      width:24px; height:24px;
      font-size:12px;
    }

    /* Card menu button always visible */
    .card-menu-btn {
      opacity:1 !important;
      background:rgba(0,0,0,.7) !important;
      width:28px; height:22px;
      bottom:5px; right:4px;
    }

    /* Section rename/delete buttons always visible */
    .sec-actions { opacity:1 !important; }
    .sec-rename-btn, .sec-delete-btn { font-size:14px; padding:4px 7px; }

    /* Column rename button always visible */
    .col-rename-btn { opacity:1 !important; font-size:14px; }

    /* Larger touch targets on pills */
    .platform-pill { padding:3px 7px; font-size:10px; }
    .platform-pill img { width:13px; height:13px; }
    .add-platform-pill { padding:3px 8px; font-size:10px; }
    .pending-btn { width:22px; height:22px; }
    .pending-btn svg { width:13px; height:13px; }

    /* Filter chips bigger tap targets */
    .filter-chip { padding:5px 14px; font-size:12px; }
    .filter-toggle-btn { padding:5px 14px; font-size:12px; }
    .filter-clear { padding:5px 16px; font-size:12px; }

    /* Topbar mobile — compact single row */
    #topbar-main { height:52px; padding:0 12px; flex-wrap:nowrap; }
    #topbar h1 { font-size:18px; }
    #topbar-controls { display:none !important; }
    #title-search-wrap { display:none !important; }
    #topbar-menu-btn { display:flex !important; }
    /* Sync status minimal */
    #sync-label { display:none; }
    .sync-dot { width:10px; height:10px; }

    /* Filter bar — horizontal scroll on touch */
    #filter-bar { flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; gap:6px; padding:8px 12px; scrollbar-width:none; }
    #filter-bar::-webkit-scrollbar { display:none; }

    /* Modal — full screen on mobile */
    .modal-overlay { padding:0; align-items:flex-end; }
    .modal-box {
      border-radius:16px 16px 0 0 !important;
      max-width:100% !important;
      width:100% !important;
      max-height:85vh !important;
      overflow-y:auto !important;
      padding:24px 20px 32px;
    }
    .modal-box.wide { max-width:100% !important; }
    /* Swipe-down handle */
    .modal-box::before {
      content:'';
      display:block;
      width:40px; height:4px;
      background:#ddd; border-radius:2px;
      margin:0 auto 16px;
    }

    /* Search results scrollable */
    .search-results { max-height:45vh; }

    /* Add card bigger tap target */
    .add-card { font-size:26px; }
    .add-section-btn { padding:12px; font-size:13px; }

    /* Context menu — full bottom sheet */
    .card-context-menu {
      position:fixed !important;
      left:0 !important; right:0 !important; bottom:0 !important;
      top:auto !important;
      width:100% !important;
      border-radius:16px 16px 0 0;
      min-width:unset;
      padding-bottom:env(safe-area-inset-bottom, 16px);
    }
    .card-ctx-item { padding:14px 20px; font-size:14px; }
    .card-ctx-sep { margin:4px 0; }

    /* Move modal options bigger */
    .move-option { padding:14px 16px; font-size:14px; }

    /* Zoom slider hidden on mobile (use pinch) */
    #topbar label[for="zoom-slider"],
    #zoom-slider, #zoom-val { display:none !important; }
  }

  /* Small screens general */
  @media (max-width:600px) {
    /* Topbar compact single row */
    #topbar { position:fixed; top:0; left:0; right:0; z-index:1000; overflow:visible; }
    #topbar-main { height:48px !important; padding:0 10px !important; flex-wrap:nowrap !important; overflow:hidden; }
    #topbar h1 { font-size:16px; flex-shrink:0; }
    #topbar-controls { display:none !important; }
    #title-search-wrap { display:none !important; }
    #topbar-menu-btn { display:flex !important; margin-left:auto; }
    #pan-hint { display:none !important; }
    #sync-label { display:none !important; }
    /* Drawer below topbar */
    #topbar-drawer { position:fixed; top:48px; left:0; right:0; z-index:999; max-height:70vh; overflow-y:auto; }
    /* Filter bar and canvas below topbar */
    #filter-bar { top:48px !important; flex-wrap:wrap; gap:6px; padding:8px 10px; }
    #canvas-viewport { top:48px !important; }
    .topbar-key-btn span:not(.dot) { display:none; }
    .topbar-key-btn { padding:7px 10px; min-width:32px; justify-content:center; }
    #title-search { width:120px; }
  }


  button, .filter-chip, .platform-pill, .add-card, .add-section-btn, .media-card .delete-btn {
    touch-action:manipulation;
  }

  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg2); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>

// ── FIGMA-STYLE PAN / ZOOM ENGINE ─────────────────────────────────────────
let _cx=60, _cy=120, _cz=0.65; // translate x,y and scale
let _panning=false, _panStartX=0, _panStartY=0, _panOriginX=0, _panOriginY=0;
let _spaceDown=false;
// Touch pinch
let _touches=[], _pinchDist0=0, _pinchZ0=0, _pinchCx0=0, _pinchCy0=0;

const MIN_Z=0.15, MAX_Z=2.0;


function resetView(){
  _cx=60; _cy=120; _cz=0.65;
  applyCanvasTransform(true);
}

let _rafPending=false;
function applyCanvasTransform(animate=false){
  const w=document.getElementById('canvas-wrapper');
  if(!w) return;
  if(animate){
    w.style.transition='transform .12s ease';
    w.style.transform=`translate(${_cx}px,${_cy}px) scale(${_cz})`;
    const pct=Math.round(_cz*100);
    document.getElementById('zoom-val').textContent=pct+'%';
    document.getElementById('zoom-slider').value=Math.max(40,Math.min(100,pct));
    return;
  }
  if(_rafPending) return;
  _rafPending=true;
  requestAnimationFrame(()=>{
    _rafPending=false;
    w.style.transition='none';
    w.style.transform=`translate(${_cx}px,${_cy}px) scale(${_cz})`;
    const pct=Math.round(_cz*100);
    document.getElementById('zoom-val').textContent=pct+'%';
    document.getElementById('zoom-slider').value=Math.max(40,Math.min(100,pct));
  });
}

function setCanvasZoom(newZ, pivotX, pivotY){
  newZ=Math.max(MIN_Z,Math.min(MAX_Z,newZ));
  const vp=document.getElementById('canvas-viewport');
  if(pivotX===undefined){ pivotX=vp.clientWidth/2; pivotY=vp.clientHeight/2; }
  // Adjust translation so zoom centers on pivot point
  const dz=newZ/_cz;
  _cx=pivotX-(pivotX-_cx)*dz;
  _cy=pivotY-(pivotY-_cy)*dz;
  _cz=newZ;
  applyCanvasTransform();
}

// ── Mouse wheel — zoom with ctrl, pan otherwise ──
document.getElementById('canvas-viewport')?.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey||e.metaKey){
    // Zoom centered on cursor
    const rect=document.getElementById('canvas-viewport').getBoundingClientRect();
    const px=e.clientX-rect.left, py=e.clientY-rect.top;
    const delta=e.deltaY>0?0.9:1.1;
    setCanvasZoom(_cz*delta, px, py);
  } else {
    // Pan
    _cx-=e.deltaX; _cy-=e.deltaY;
    applyCanvasTransform();
  }
},{passive:false});

// ── Mouse drag — pan with space or middle button ──
document.getElementById('canvas-viewport')?.addEventListener('mousedown',e=>{
  if(_spaceDown||e.button===1||e.button===2){
    e.preventDefault();
    _panning=true; _panStartX=e.clientX; _panStartY=e.clientY;
    _panOriginX=_cx; _panOriginY=_cy;
    const vp=document.getElementById('canvas-viewport');
    vp?.classList.add('panning-active');
  }
});
let _rafMousePending = false;
let _rafMouseX = 0, _rafMouseY = 0;
window.addEventListener('mousemove',e=>{
  if(!_panning) return;
  _rafMouseX = _panOriginX+(e.clientX-_panStartX);
  _rafMouseY = _panOriginY+(e.clientY-_panStartY);
  if(!_rafMousePending){
    _rafMousePending = true;
    requestAnimationFrame(()=>{
      _cx = _rafMouseX; _cy = _rafMouseY;
      applyCanvasTransform();
      _rafMousePending = false;
    });
  }
});
window.addEventListener('mouseup',e=>{
  if(_panning){
    _panning=false;
    const vp=document.getElementById('canvas-viewport');
    vp?.classList.remove('panning-active');
  }
});

// ── Touch — two-finger pan + pinch zoom (clean, no drift) ──
let _pinchStartMidX=0, _pinchStartMidY=0;

document.getElementById('canvas-viewport')?.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    const t0=e.touches[0], t1=e.touches[1];
    const dx=t0.clientX-t1.clientX, dy=t0.clientY-t1.clientY;
    _pinchDist0=Math.hypot(dx,dy);
    _pinchZ0=_cz;
    _pinchCx0=_cx; _pinchCy0=_cy;
    // Store initial midpoint in CANVAS coordinates
    _pinchStartMidX=(t0.clientX+t1.clientX)/2;
    _pinchStartMidY=(t0.clientY+t1.clientY)/2;
  }
  _touches=[...e.touches];
},{passive:true});

document.getElementById('canvas-viewport')?.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const t0=e.touches[0], t1=e.touches[1];
    const dist=Math.hypot(t0.clientX-t1.clientX, t0.clientY-t1.clientY);
    const midX=(t0.clientX+t1.clientX)/2;
    const midY=(t0.clientY+t1.clientY)/2;
    const newZ=Math.max(MIN_Z,Math.min(MAX_Z,_pinchZ0*(dist/_pinchDist0)));
    // Zoom around the FIXED initial midpoint (eliminates drift)
    const scale=newZ/_pinchZ0;
    // Pan = current mid minus start mid
    const panDx=midX-_pinchStartMidX;
    const panDy=midY-_pinchStartMidY;
    _cx=_pinchStartMidX*(1-scale) + _pinchCx0*scale + panDx;
    _cy=_pinchStartMidY*(1-scale) + _pinchCy0*scale + panDy;
    _cz=newZ;
    applyCanvasTransform();
  }
},{passive:false});

let _navMode = false; // false = edit mode, true = nav mode
let _oneTouchPanning = false;
let _oneTouchStartX = 0, _oneTouchStartY = 0;
let _oneTouchOriginX = 0, _oneTouchOriginY = 0;

function toggleNavMode(){
  _navMode = !_navMode;
  const btn = document.getElementById('nav-mode-btn');
  const vp  = document.getElementById('canvas-viewport');
  const hint= document.getElementById('nav-hint');
  const iconNav  = document.getElementById('nav-icon-nav');
  const iconEdit = document.getElementById('nav-icon-edit');
  const overlay  = document.getElementById('nav-overlay');
  if(_navMode){
    btn?.classList.add('nav-active');
    vp?.classList.add('nav-mode');
    if(iconNav)  iconNav.style.display='none';
    if(iconEdit) iconEdit.style.display='';
    if(hint){ hint.classList.add('visible'); setTimeout(()=>hint.classList.remove('visible'),2000); }
  } else {
    btn?.classList.remove('nav-active');
    vp?.classList.remove('nav-mode');
    if(iconNav)  iconNav.style.display='';
    if(iconEdit) iconEdit.style.display='none';
  }
  // Wire overlay touch to pan (same as one-finger pan)
  if(overlay){
    overlay.ontouchstart = _navMode ? (e=>{
      _oneTouchPanning=true;
      _oneTouchStartX=e.touches[0].clientX; _oneTouchStartY=e.touches[0].clientY;
      _oneTouchOriginX=_cx; _oneTouchOriginY=_cy;
    }) : null;
    overlay.ontouchmove = _navMode ? (e=>{
      e.preventDefault();
      _rafPanX=_oneTouchOriginX+(e.touches[0].clientX-_oneTouchStartX);
      _rafPanY=_oneTouchOriginY+(e.touches[0].clientY-_oneTouchStartY);
      if(!_rafPanPending){ _rafPanPending=true; requestAnimationFrame(()=>{ _cx=_rafPanX; _cy=_rafPanY; applyCanvasTransform(); _rafPanPending=false; }); }
    }) : null;
    overlay.ontouchend = _navMode ? (()=>{ _oneTouchPanning=false; }) : null;
  }
}

// One-finger pan in nav mode
document.getElementById('canvas-viewport')?.addEventListener('touchstart', e=>{
  if(!_navMode || e.touches.length !== 1) return;
  _oneTouchPanning = true;
  _oneTouchStartX = e.touches[0].clientX;
  _oneTouchStartY = e.touches[0].clientY;
  _oneTouchOriginX = _cx; _oneTouchOriginY = _cy;
  document.getElementById('canvas-viewport')?.classList.add('panning-active');
}, {passive:true});

let _rafPanPending = false;
let _rafPanX = 0, _rafPanY = 0;
document.getElementById('canvas-viewport')?.addEventListener('touchmove', e=>{
  if(!_oneTouchPanning || e.touches.length !== 1) return;
  e.preventDefault();
  _rafPanX = _oneTouchOriginX + (e.touches[0].clientX - _oneTouchStartX);
  _rafPanY = _oneTouchOriginY + (e.touches[0].clientY - _oneTouchStartY);
  if(!_rafPanPending){
    _rafPanPending = true;
    requestAnimationFrame(()=>{
      _cx = _rafPanX; _cy = _rafPanY;
      applyCanvasTransform();
      _rafPanPending = false;
    });
  }
}, {passive:false});

document.getElementById('canvas-viewport')?.addEventListener('touchend', e=>{
  if(_oneTouchPanning){
    _oneTouchPanning = false;
    document.getElementById('canvas-viewport')?.classList.remove('panning-active');
  }
}, {passive:true});

function tvPan(dx, dy){
  _cx += dx; _cy += dy;
  applyCanvasTransform(true);
}

// Tizen detection
function detectTizen(){
  const ua = navigator.userAgent || '';
  const isTizen = /Tizen/i.test(ua) || /SmartTV/i.test(ua) || /SMART-TV/i.test(ua);
  if(isTizen){
    document.body.classList.add('tizen-detected');
    document.getElementById('tv-controls').style.display = 'flex';
    document.getElementById('nav-mode-btn').style.display = 'none';
    // Arrow key navigation for TV remote
    window.addEventListener('keydown', tvKeyHandler);
  }
}

function tvKeyHandler(e){
  if(e.target.matches('input,textarea,select')) return;
  const STEP = 120;
  const ZOOM_STEP = 0.15;
  switch(e.key){
    case 'ArrowUp':    e.preventDefault(); tvPan(0, STEP); break;
    case 'ArrowDown':  e.preventDefault(); tvPan(0, -STEP); break;
    case 'ArrowLeft':  e.preventDefault(); tvPan(STEP, 0); break;
    case 'ArrowRight': e.preventDefault(); tvPan(-STEP, 0); break;
    case '+': case '=': e.preventDefault(); setCanvasZoom(_cz+ZOOM_STEP); break;
    case '-':           e.preventDefault(); setCanvasZoom(_cz-ZOOM_STEP); break;
    case 'Enter': break; // let it propagate for clicking focused elements
  }
}

async function sbFetch(path, opts={}){
  const res=await fetch(SB_URL+path, {
    ...opts,
    headers:{
      'apikey': SB_KEY,
      'Authorization': 'Bearer '+SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer||'',
      ...opts.headers
    }
  });
  return res;
}

async function saveToSupabase(){
  if(_saving) return;
  _saving=true;
  setSyncStatus('syncing','Guardando…');
  try{
    // First ensure table exists via upsert
    const body=JSON.stringify({
      id: SB_BOARD_ID,
      data: state,
      updated_at: new Date().toISOString()
    });
    const r=await sbFetch('/rest/v1/mediaboard',{
      method:'POST',
      prefer:'resolution=merge-duplicates',
      headers:{'Prefer':'resolution=merge-duplicates'},
      body
    });
    if(r.ok||r.status===409){
      localStorage.setItem('mediaboard_state',JSON.stringify(state));
      setSyncStatus('synced','Guardado ✓');
    } else {
      const err=await r.text();
      // Table might not exist — try to create it
      if(r.status===404||r.status===400||err.includes('does not exist')||err.includes('relation')){
        await createTableAndSave();
      } else {
        setSyncStatus('error','Error al guardar');
        console.error('Supabase save error:',r.status,err);
      }
    }
  } catch(e){
    setSyncStatus('error','Sin conexión');
    localStorage.setItem('mediaboard_state',JSON.stringify(state));
  } finally{ _saving=false; }
}

async function createTableAndSave(){
  // Create table via Supabase SQL API
  setSyncStatus('syncing','Creando tabla…');
  try{
    const sql=`CREATE TABLE IF NOT EXISTS mediaboard (id text PRIMARY KEY, data jsonb NOT NULL, updated_at timestamptz DEFAULT now());
ALTER TABLE mediaboard ENABLE ROW LEVEL SECURITY;
CREATE POLICY IF NOT EXISTS "allow_all" ON mediaboard FOR ALL USING (true) WITH CHECK (true);`;
    const r=await sbFetch('/rest/v1/rpc/exec_sql',{
      method:'POST',
      body:JSON.stringify({query:sql})
    });
    // Try save again regardless
    await saveToSupabase();
  } catch(e){
    setSyncStatus('error','Configura la tabla en Supabase');
    showToast('⚠️ Necesitas crear la tabla en Supabase. Ver consola.');

  }
}

function sanitizeState(s){
  // Handle case where data is the columns array directly
  if(Array.isArray(s)) s={columns:s};
  if(!s||typeof s!=='object') return {columns:[]};
  if(!Array.isArray(s.columns)) s.columns=[];
  s.columns=s.columns.map(col=>{
    if(!col.id) col.id='_'+Math.random().toString(36).slice(2,7);
    if(!col.name) col.name='Sin nombre';
    if(!Array.isArray(col.top10)) col.top10=[];
    if(!Array.isArray(col.sections)) col.sections=[{id:'_'+Math.random().toString(36).slice(2,7),name:col.name,cards:[],bgColor:''}];
    col.sections=col.sections.map(sec=>{
      if(!sec.id) sec.id='_'+Math.random().toString(36).slice(2,7);
      if(!sec.name) sec.name='';
      if(!Array.isArray(sec.cards)) sec.cards=[];
      // Strip unreliable RAWG time data
      sec.cards=sec.cards.map(card=>{
        delete card.ttbMain; delete card.ttbMainSides; delete card.ttbComplete;
        return card;
      });
      return sec;
    });
    col.top10=col.top10.map(card=>{
      delete card.ttbMain; delete card.ttbMainSides; delete card.ttbComplete;
      return card;
    });
    return col;
  });
  return s;
}

      if(s) state=sanitizeState(JSON.parse(s));

      return;
    }
    const rows=await r.json();
    if(rows&&rows.length>0&&rows[0].data){
      state=sanitizeState(rows[0].data);
      localStorage.setItem('mediaboard_state',JSON.stringify(state));

    if(s) state=sanitizeState(JSON.parse(s));

// ── FETCH PROVIDERS — ES flatrate only, deduplicated ─────────────────────
async function fetchProviders(tmdbId, mediaType){
  const key=getKey(); if(!key||!tmdbId) return[];
  try{
    const ctrl=new AbortController(); setTimeout(()=>ctrl.abort(),4000);
    const type=mediaType==='tv'?'tv':'movie';
    const r=await fetch(`${TMDB_BASE}/${type}/${tmdbId}/watch/providers?api_key=${key}`,{signal:ctrl.signal});
    if(!r.ok) return[];
    const d=await r.json();
    const region=d.results?.ES||{};
    const out=[], seenIds=new Set();
    (region.flatrate||[]).forEach(p=>{
      // Skip anything with "channel", "addon", "with ads" in name (case-insensitive)
      if(/channel|addon|with ads/i.test(p.provider_name)) return;
      const mapped=PROVIDER_MAP[p.provider_id];
      const pid=mapped?.id||('p'+p.provider_id);
      if(seenIds.has(pid)) return; // deduplicate
      seenIds.add(pid);
      // Use live logo_path from API — always most accurate
      const logo=p.logo_path?'https://image.tmdb.org/t/p/w45'+p.logo_path:(mapped?providerLogo(mapped):'');
      out.push({ id:pid, name:mapped?.name||p.provider_name, logo });
    });
    return out;
  }catch{return[];}
}

function parseGameQuery(raw){
  // Extract year (4-digit 19xx or 20xx) and platform hints from query
  // e.g. "In the Hunt 1993" → {name:"In the Hunt", year:1993}
  // e.g. "In the Hunt neo geo" → {name:"In the Hunt", platform:"neo geo"}
  const PLATFORMS={
    'neo geo':'Neo Geo','neogeo':'Neo Geo','arcade':'Arcade',
    'snes':'Super Nintendo Entertainment System','nes':'Nintendo Entertainment System',
    'n64':'Nintendo 64','gameboy':'Game Boy','gba':'Game Boy Advance',
    'gb':'Game Boy','megadrive':'Sega Mega Drive/Genesis','genesis':'Sega Mega Drive/Genesis',
    'master system':'Sega Master System','saturn':'Sega Saturn','dreamcast':'Dreamcast',
    'ps1':'PlayStation','psx':'PlayStation','ps2':'PlayStation 2',
    'ps3':'PlayStation 3','ps4':'PlayStation 4','ps5':'PlayStation 5',
    'psp':'PlayStation Portable','vita':'PlayStation Vita',
    'xbox':'Xbox','xbox360':'Xbox 360','xbox one':'Xbox One',
    'pc':'PC (Microsoft Windows)','windows':'PC (Microsoft Windows)',
    'switch':'Nintendo Switch','3ds':'Nintendo 3DS','ds':'Nintendo DS',
    'wii':'Wii','wiiu':'Wii U','gamecube':'GameCube','n64':'Nintendo 64',
    'atari':'Atari','amiga':'Amiga','dos':'DOS',
  };
  let name=raw.trim();
  let year=null, platform=null;

  // Extract year
  const yearMatch=name.match(/(19\d{2}|20\d{2})/);
  if(yearMatch){ year=parseInt(yearMatch[1]); name=name.replace(yearMatch[0],'').trim(); }

  // Extract platform (check longest match first)
  const lc=name.toLowerCase();
  const sorted=Object.keys(PLATFORMS).sort((a,b)=>b.length-a.length);
  for(const key of sorted){
    if(lc.endsWith(' '+key)||lc.includes(' '+key+' ')){
      platform=PLATFORMS[key];
      name=name.replace(new RegExp('\\s+'+key+'\\s*$','i'),'').trim();
      break;
    }
  }
  return {name, year, platform};
}

function generateQueryVariants(q){
  // Generate alternate spellings to maximize IGDB hits
  const variants=new Set([q]);
  // MegaMan → Mega Man and vice versa
  const spaced=q.replace(/([a-z])([A-Z])/g,'$1 $2');
  if(spaced!==q) variants.add(spaced);
  const unspaced=q.replace(/(Mega)\s+(Man)/gi,'MegaMan')
                   .replace(/(Pac)\s*(Man)/gi,'Pac-Man')
                   .replace(/(Rock)\s*(Man)/gi,'Rockman')
                   .replace(/(Spider)\s*(-?)\s*(Man)/gi,'Spider-Man');
  if(unspaced!==q) variants.add(unspaced);
  // Mega Man → Rockman (regional alias)
  if(/mega\s*man/i.test(q)) variants.add(q.replace(/mega\s*man/gi,'Rockman'));
  if(/rockman/i.test(q)) variants.add(q.replace(/rockman/gi,'Mega Man'));
  // Castlevania → Akumajo Dracula
  if(/castlevania/i.test(q)) variants.add(q.replace(/castlevania/gi,'Akumajo Dracula'));
  // Remove subtitles after colon/dash for broader search
  const noSub=q.replace(/\s*[:\-–]\s*.+$/,'').trim();
  if(noSub&&noSub!==q&&noSub.length>3) variants.add(noSub);
  // Remove roman numerals at end for series search
  const noNum=q.replace(/\s+[IVX]+$/i,'').trim();
  if(noNum&&noNum!==q&&noNum.length>3) variants.add(noNum);
  return [...variants];
}

async function igdbSearch(query){
  const {name, year, platform}=parseGameQuery(query);
  const q=name.replace(/"/g,"'").trim();
  const FIELDS='fields id,name,cover.image_id,first_release_date,genres.name,platforms.name';

  let extraWhere='';
  if(year) extraWhere+=` & first_release_date >= ${Math.floor(new Date(year+'-01-01').getTime()/1000)} & first_release_date <= ${Math.floor(new Date(year+'-12-31').getTime()/1000)}`;

  const filterByPlatform=(results)=>{
    if(!platform||!results.length) return results;
    const key=platform.toLowerCase().split(' ')[0];
    const f=results.filter(r=>(r.platforms||[]).some(p=>p.name?.toLowerCase().includes(key)));
    return f.length?f:results;
  };

  // Try all variants with search operator
  const variants=generateQueryVariants(q);
  for(const v of variants){
    let body=extraWhere
      ? `search "${v}"; ${FIELDS}; where (1=1${extraWhere}); limit 8;`
      : `search "${v}"; ${FIELDS}; limit 8;`;
    const r=await igdbQuery('games', body);
    const results=filterByPlatform(r?.filter(x=>x?.name)||[]);
    if(results.length) return results;
  }

  // Fallback: where name ~ contains (handles special chars & obscure titles)
  const escaped=q.replace(/"/g,'\\"');
  const r2=await igdbQuery('games',
    `where name ~ *"${escaped}"*${extraWhere}; ${FIELDS}; sort total_rating_count desc; limit 8;`
  );
  const res2=filterByPlatform(r2?.filter(x=>x?.name)||[]);
  if(res2.length) return res2;

  // Fallback: each word as partial match (for multi-word titles)
  const words=q.split(' ').filter(w=>w.length>3);
  if(words.length>1){
    const firstWord=words[0].replace(/"/g,'\\"');
    const r3=await igdbQuery('games',
      `where name ~ *"${firstWord}"*${extraWhere}; ${FIELDS}; sort total_rating_count desc; limit 10;`
    );
    if(r3?.length){
      // Client-side filter: all words present in name
      const filtered=r3.filter(g=>g.name&&words.every(w=>g.name.toLowerCase().includes(w.toLowerCase())));
      if(filtered.length) return filtered;
      return filterByPlatform(r3.filter(x=>x?.name).slice(0,8));
    }
  }

  // Fallback: strip diacritics
  const normalized=q.normalize('NFD').replace(/[̀-ͯ]/g,'');
  if(normalized!==q){
    const r4=await igdbQuery('games', `search "${normalized}"; ${FIELDS}; limit 8;`);
    const res4=r4?.filter(x=>x?.name)||[];
    if(res4.length) return res4;
  }

  return [];
}

async function igdbDetails(igdbId){
  const results=await igdbQuery('games',
    `where id=${igdbId}; fields id,name,cover.image_id,first_release_date,genres.name,platforms.name,summary; limit 1;`
  );
  return results?.[0]||null;
}

function igdbCover(imageId){
  return imageId?`https://images.igdb.com/igdb/image/upload/t_cover_big/${imageId}.jpg`:'';
}

function formatHours(seconds){
  if(!seconds||seconds<=0) return null;
  const h=seconds/3600;
  return h<1?Math.round(h*60)+'min':h%1===0?h+'h':h.toFixed(1).replace('.0','')+'h';
}

async function doGameSearch(query,colId,sectionId,inTop10){
  if(!getIGDBClientId()||!getIGDBSecret()){ showToast('⚠️ Configura el Client ID y Secret de IGDB primero'); return; }
  // Support both the standalone game modal and the combined search modal
  const area=document.getElementById('game-results-area')||document.getElementById('search-results-area');
  const areaId=document.getElementById('game-results-area')?'game-results-area':'search-results-area';
  if(!area||!query.trim()) return;
  area.innerHTML='<p class="no-results">Buscando <span class="spinner"></span></p>';
  const results=await igdbSearch(query);
  if(!document.getElementById(areaId)) return;
  if(!results||!results.length||!results[0]?.name){area.innerHTML='<p class="no-results">Sin resultados</p>';return;}
  area.innerHTML='<div class="search-results">'+results.map((r,i)=>{
    const title=r.name||'?';
    const year=r.first_release_date?new Date(r.first_release_date*1000).getFullYear():'';
    const cover=r.cover?.image_id?igdbCover(r.cover.image_id):'';
    const ttb=r.time_to_beat;
    const main=ttb?.normally?formatHours(ttb.normally):'';
    const plats=(r.platforms||[]).slice(0,3).map(p=>p.name).join(', ');
    // Use _searchColId etc if available (combined modal), else use passed params
    const _cid=window._searchColId||colId;
    const _sid=window._searchSecId||sectionId;
    const _t10=window._searchInTop10!==undefined?window._searchInTop10:inTop10;
    return `<div class="search-result-item" onclick="pickGame('${_cid}','${_sid}',${i},${_t10})">
      <img src="${cover}" alt="" style="object-fit:cover">
      <div>
        <div class="result-title">🎮 ${escHtml(title)}</div>
        <div class="result-meta">${year}${main?' · '+main+' main':''}${plats?' · '+escHtml(plats):''}</div>
      </div></div>`;
  }).join('')+'</div>';
  window._gameResults=results;
}

async function pickGame(colId,sectionId,idx,inTop10){
  const r=window._gameResults?.[idx]; if(!r) return;
  const area=document.getElementById('game-results-area')||document.getElementById('search-results-area');
  if(area) area.innerHTML='<p class="no-results">Cargando detalles… <span class="spinner"></span></p>';
  // Fetch full details for time_to_beat
  const full=await igdbDetails(r.id)||r;
  const ttb=full.time_to_beat||r.time_to_beat||{};
  const title=full.name||'?';
  const year=full.first_release_date?new Date(full.first_release_date*1000).getFullYear():'';
  const poster=full.cover?.image_id?igdbCover(full.cover.image_id):(r.cover?.image_id?igdbCover(r.cover.image_id):'');
  const genres=(full.genres||r.genres||[]).map(g=>g.name);
  const platforms=(full.platforms||r.platforms||[]).map(p=>p.name);
  const card={
    id:uid(), title, year:String(year), poster,
    platforms:[], genres, pending:false,
    mediaType:'game', igdbId:r.id,
    ttbMain: (full.time_to_beat?.normally||r.time_to_beat?.normally||null),
    ttbMainSides: (full.time_to_beat?.hastily||r.time_to_beat?.hastily||null),
    ttbComplete: (full.time_to_beat?.completely||r.time_to_beat?.completely||null),
    gamePlatforms: platforms,
  };
  // If filling an empty slot — replace it in position
  if(window._fillSlotMode&&window._fillSlotTarget){
    const target=window._fillSlotTarget;
    window._fillSlotMode=false; window._fillSlotTarget=null;
    card.id=target.cardId;
    const col2=state.columns.find(c=>c.id===target.colId); if(!col2){closeModal();return;}
    if(target.inTop10){ const i=col2.top10.findIndex(x=>x.id===target.cardId); if(i>=0) col2.top10[i]=card; }
    else{ const sec=col2.sections.find(s=>s.id===target.secId); if(sec){ const i=sec.cards.findIndex(x=>x.id===target.cardId); if(i>=0) sec.cards[i]=card; } }
    closeModal(); renderAll(); return;
  }

  const col=state.columns.find(c=>c.id===colId); if(!col) return;
  if(inTop10){
    if(col.top10.length>=10){showToast('Top 10 lleno');return;}
    col.top10.push(card);
  } else {
    const sec=col.sections.find(s=>s.id===sectionId); if(sec) sec.cards.push(card);
  }
  closeModal(); renderAll();
}

let activeFilters = { duration: null, genres: new Set() };
let showPlatforms = true;   // toggle platform pills visibility
let showRatings   = false;  // toggle TMDB rating overlay on cards

const DURATION_FILTERS = [
  { id:'game',  label:'Juegos',       test: c => c.mediaType==='game' },
  { id:'series',label:'Series',       test: c => c.mediaType==='tv' },
  { id:'ended', label:'Terminadas',    test: c => c.mediaType==='tv'&&c.ended===true },
  { id:'ongoing',label:'En emisión',   test: c => c.mediaType==='tv'&&!c.ended },
  { id:'lt30',  label:'Hasta 30 min', test: c => c.runtime&&c.runtime<=30 },
  { id:'lt60',  label:'Hasta 60 min', test: c => c.runtime&&c.runtime<=60 },
  { id:'lt90',  label:'Hasta 90 min', test: c => c.runtime&&c.runtime<=90 },
  { id:'lt120', label:'Hasta 2h',     test: c => c.runtime&&c.runtime<=120 },
  { id:'lt150', label:'Hasta 2h30',   test: c => c.runtime&&c.runtime<=150 },
  { id:'gt150', label:'Más de 2h30',  test: c => c.runtime&&c.runtime>150 },
];

function cardMatchesFilters(card){
  // Duration filter
  if(activeFilters.duration){
    const df=DURATION_FILTERS.find(f=>f.id===activeFilters.duration);
    if(df&&!df.test(card)) return false;
  }
  // Genre filter (card must have ALL selected genres)
  for(const g of activeFilters.genres){
    if(!(card.genres||[]).includes(g)) return false;
  }
  return true;
}

function hasActiveFilters(){
  return activeFilters.duration||activeFilters.genres.size>0;
}


function toggleShowPlatforms(){
  showPlatforms=!showPlatforms;
  document.querySelectorAll('.card-platforms').forEach(el=>{
    el.style.display=showPlatforms?'':'none';
  });

}

function toggleShowRatings(){

  renderFilterBar();
  renderAll(); // re-render to show/hide rating overlays
}

function toggleDurationFilter(id){
  activeFilters.duration = activeFilters.duration===id ? null : id;
  renderFilterBar(); renderAll();
}

function toggleGenreFilter(genre){
  if(activeFilters.genres.has(genre)) activeFilters.genres.delete(genre);
  else activeFilters.genres.add(genre);
  renderFilterBar(); renderAll();
}

function clearFilters(){
  activeFilters.duration=null; activeFilters.genres=new Set();
  renderFilterBar(); renderAll();
}

// Collect all genres present in the board
function getAllGenres(){
  const genres=new Set();
  state.columns.forEach(col=>{
    [...col.top10,...col.sections.flatMap(s=>s.cards)].forEach(card=>{
      (card.genres||[]).forEach(g=>genres.add(g));
    });
  });
  return [...genres].sort();
}

// ── FETCH DETAILS (runtime / seasons) ────────────────────────────────────
async function fetchDetails(tmdbId, mediaType){
  const key=getKey(); if(!key||!tmdbId) return null;
  try{
    const ctrl=new AbortController(); setTimeout(()=>ctrl.abort(),4000);
    const type=mediaType==='tv'?'tv':'movie';
    const r=await fetch(`${TMDB_BASE}/${type}/${tmdbId}?api_key=${key}&language=es-ES`,{signal:ctrl.signal});
    if(!r.ok) return null;
    const d=await r.json();
    const genres=(d.genres||[]).map(g=>g.name);
    const rating=typeof d.vote_average==='number'&&d.vote_average>0 ? Math.round(d.vote_average*10)/10 : null;
    if(mediaType==='tv') return { seasons:d.number_of_seasons||null, genres, ended: d.status==='Ended'||d.status==='Canceled', rating };
    else return { runtime:d.runtime||null, genres, rating };
  }catch{return null;}
}
