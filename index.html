async function doUnifiedSearch(query){
  const area=document.getElementById('search-results-area');
  if(!area||!query.trim()) return;
  area.innerHTML='<p class="no-results">Buscando <span class="spinner"></span></p>';
  const colId=window._searchColId, secId=window._searchSecId, inTop10=window._searchInTop10;
  // Run TMDB and IGDB in parallel
  const hasIGDB=!!(getIGDBClientId()&&getIGDBSecret());
  const [tmdbResults, igdbResults]=await Promise.all([
    tmdbSearch(query).catch(()=>[]),
    hasIGDB ? igdbSearch(query).catch(()=>[]) : Promise.resolve([])
  ]);
  if(!document.getElementById('search-results-area')) return;
  // Merge: TMDB first, then IGDB, max 10 total
  const allResults=[];
  // Map TMDB results
  (tmdbResults||[]).slice(0,6).forEach((r,i)=>{
    allResults.push({type:'tmdb', data:r, idx:i});
  });
  // Map IGDB results
  (igdbResults||[]).filter(r=>r?.name).slice(0,4).forEach((r,i)=>{
    allResults.push({type:'igdb', data:r, idx:i});
  });
  if(!allResults.length){
    area.innerHTML='<p class="no-results">Sin resultados</p>';
    return;
  }
  window._searchResults=tmdbResults||[];
  window._gameResults=igdbResults||[];
  area.innerHTML='<div class="search-results">'+allResults.map((item,i)=>{
    if(item.type==='tmdb'){
      const r=item.data;
      const title=r.title||r.name||'?';
      const year=(r.release_date||r.first_air_date||'').slice(0,4);
      const icon=r.media_type==='movie'?'🎬':'📺';
      const poster=r.poster_path?IMG_BASE+r.poster_path:'';
      const typeBadge=r.media_type==='movie'
        ?`<span style="background:#e63946;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.3px;flex-shrink:0">PELÍCULA</span>`
        :`<span style="background:#1a1a1a;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.3px;flex-shrink:0">SERIE</span>`;
      return `<div class="search-result-item" onclick="pickResult('${colId}','${secId}',${item.idx},${inTop10})">
        <img src="${poster}" alt="">
        <div>
          <div class="result-title" style="display:flex;align-items:center;gap:5px">${typeBadge} ${escHtml(title)}</div>
          <div class="result-meta">${year}</div>
        </div></div>`;
    } else {
      const r=item.data;
      const title=r.name||'?';
      const year=r.first_release_date?new Date(r.first_release_date*1000).getFullYear():'';
      const cover=r.cover?.image_id?igdbCover(r.cover.image_id):'';
      const plats=(r.platforms||[]).slice(0,2).map(p=>p.name).join(', ');
      return `<div class="search-result-item" onclick="pickGame('${colId}','${secId}',${item.idx},${inTop10})">
        <img src="${cover}" alt="">
        <div>
          <div class="result-title" style="display:flex;align-items:center;gap:5px">
            <span style="background:#2d6a4f;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.3px;flex-shrink:0">JUEGO</span>
            ${escHtml(title)}
          </div>
          <div class="result-meta">${year}${plats?' · '+escHtml(plats):''}</div>
        </div></div>`;
    }
  }).join('')+'</div>';
}

function addManualCard(){
  const title=document.getElementById('manual-title')?.value.trim();
  if(!title){ showToast('Escribe un título'); return; }
  const year=document.getElementById('manual-year')?.value.trim()||'';
  const colId=window._searchColId, secId=window._searchSecId, inTop10=window._searchInTop10;
  const card={
    id:uid(), title, year, poster:'', platforms:[], genres:[],
    pending:false, mediaType:'manual', isManual:true
  };
  const col=state.columns.find(c=>c.id===colId); if(!col) return;
  if(inTop10){
    if(col.top10.length>=10){showToast('Top 10 lleno');return;}
    col.top10.push(card);
  } else {
    const sec=col.sections.find(s=>s.id===secId); if(sec) sec.cards.push(card);
  }
  closeModal(); renderAll(); showToast('Añadido ✓');
}
async function doSearch(query,colId,sectionId,inTop10){
  const area=document.getElementById('search-results-area');
  if(!area||!query.trim()) return;
  area.innerHTML='<p class="no-results">Buscando <span class="spinner"></span></p>';
  const results=await tmdbSearch(query);
  if(!document.getElementById('search-results-area')) return;
  if(!results||!results.length){area.innerHTML='<p class="no-results">Sin resultados para "'+escHtml(query)+'"</p>';return;}
  area.innerHTML='<div class="search-results">'+results.map((r,i)=>{
    const title=r.title||r.name||'?';
    const year=(r.release_date||r.first_air_date||'').slice(0,4);
    const icon=r.media_type==='movie'?'🎬':'📺';
    const poster=r.poster_path?IMG_BASE+r.poster_path:'';
    return `<div class="search-result-item" onclick="pickResult('${colId}','${sectionId}',${i},${inTop10})">
      <img src="${poster}" alt="">
      <div><div class="result-title">${icon} ${escHtml(title)}</div>
      <div class="result-meta">${year} · ${r.media_type==='movie'?'Película':'Serie'}</div></div></div>`;
  }).join('')+'</div>';
  window._searchResults=results;
}
async function pickResult(colId,sectionId,idx,inTop10){
  const r=window._searchResults?.[idx]; if(!r) return;
  const title=r.title||r.name||'?';
  const year=(r.release_date||r.first_air_date||'').slice(0,4);
  const poster=r.poster_path?IMG_BASE+r.poster_path:'';
  const area=document.getElementById('search-results-area');
  if(area) area.innerHTML='<p class="no-results">Cargando datos… <span class="spinner"></span></p>';
  const [platforms,details]=await Promise.all([
    fetchProviders(r.id,r.media_type),
    fetchDetails(r.id,r.media_type)
  ]);

  // If filling an empty slot — replace it instead of pushing
  if(window._fillSlotMode&&window._fillSlotTarget){
    const target=window._fillSlotTarget;
    window._fillSlotMode=false; window._fillSlotTarget=null;
    const newCard={id:target.cardId,title,year,poster,platforms,tmdbId:r.id,mediaType:r.media_type,pending:false,genres:[],isEmpty:false};
    if(details){
      if(r.media_type==='tv'&&details.seasons) newCard.seasons=details.seasons;
      if(r.media_type==='movie'&&details.runtime) newCard.runtime=details.runtime;
      if(details.genres) newCard.genres=details.genres;
      if(details.rating!==undefined&&details.rating!==null) newCard.rating=details.rating;
      if(r.media_type==='tv'&&details.ended!==undefined) newCard.ended=details.ended;
    }
    const col=state.columns.find(c=>c.id===target.colId); if(!col) return;
    if(target.inTop10){ const i=col.top10.findIndex(x=>x.id===target.cardId); if(i>=0) col.top10[i]=newCard; }
    else{ const sec=col.sections.find(s=>s.id===target.secId); if(sec){ const i=sec.cards.findIndex(x=>x.id===target.cardId); if(i>=0) sec.cards[i]=newCard; } }
    closeModal(); renderAll(); return;
  }

  // Normal add
  const card={id:uid(),title,year,poster,platforms,tmdbId:r.id,mediaType:r.media_type,pending:false,genres:[]};
  if(details){
    if(r.media_type==='tv'&&details.seasons) card.seasons=details.seasons;
    if(r.media_type==='tv'&&details.ended!==undefined) card.ended=details.ended;
    if(details.rating!==undefined&&details.rating!==null) card.rating=details.rating;
    if(r.media_type==='movie'&&details.runtime) card.runtime=details.runtime;
    if(details.genres) card.genres=details.genres;
  }
  // If filling an empty slot — replace it in position
  if(window._fillSlotMode&&window._fillSlotTarget){
    const target=window._fillSlotTarget;
    window._fillSlotMode=false; window._fillSlotTarget=null;
    card.id=target.cardId;
    const col2=state.columns.find(c=>c.id===target.colId); if(!col2){closeModal();return;}
    if(target.inTop10){ const i=col2.top10.findIndex(x=>x.id===target.cardId); if(i>=0) col2.top10[i]=card; }
    else{ const sec=col2.sections.find(s=>s.id===target.secId); if(sec){ const i=sec.cards.findIndex(x=>x.id===target.cardId); if(i>=0) sec.cards[i]=card; } }
    closeModal(); renderAll(); return;
  }

  const col=state.columns.find(c=>c.id===colId); if(!col) return;
  if(inTop10){
    if(col.top10.length>=10){showToast('Top 10 lleno');return;}
    col.top10.push(card);
  } else {
    const sec=col.sections.find(s=>s.id===sectionId); if(sec) sec.cards.push(card);
  }
  closeModal(); renderAll();
}

// ── DELETE — inline overlay on the card ──────────────────────────────────
function showInlineDelete(btn,colId,sectionId,cardId,inTop10){
  const card=btn.closest('.media-card'); if(!card) return;
  // Remove any existing overlay
  card.querySelectorAll('.delete-overlay').forEach(el=>el.remove());
  const ov=document.createElement('div');
  ov.className='delete-overlay';
  ov.innerHTML=`<span class="delete-ov-label">¿Quitar?</span>
    <button class="delete-ov-yes" onclick="event.stopPropagation();doDelete('${colId}','${sectionId}','${cardId}',${inTop10})">Sí</button>
    <button class="delete-ov-no" onclick="event.stopPropagation();this.closest('.delete-overlay').remove()">No</button>`;
  card.querySelector('.card-img-wrap').appendChild(ov);
}
function doDelete(colId,sectionId,cardId,inTop10){
  const col=state.columns.find(c=>c.id===colId); if(!col) return;
  if(inTop10) col.top10=col.top10.filter(c=>c.id!==cardId);
  else{const s=col.sections.find(s=>s.id===sectionId);if(s) s.cards=s.cards.filter(c=>c.id!==cardId);}
  closeModal(); renderAll();
}

// ── PENDING TOGGLE ────────────────────────────────────────────────────────
function togglePending(colId,sectionId,cardId,inTop10){
  const col=state.columns.find(c=>c.id===colId); if(!col) return;
  const card=inTop10
    ?col.top10.find(x=>x.id===cardId)
    :col.sections.find(s=>s.id===sectionId)?.cards.find(x=>x.id===cardId);
  if(card){ card.pending=!card.pending; renderAll(); }
}

// ── STREAMING PICKER ──────────────────────────────────────────────────────
function getCard(colId,sectionId,cardId,inTop10){
  const col=state.columns.find(c=>c.id===colId);
  return inTop10?col?.top10.find(x=>x.id===cardId):col?.sections.find(s=>s.id===sectionId)?.cards.find(x=>x.id===cardId);
}
function openStreamingPicker(colId,sectionId,cardId,inTop10){
  const card=getCard(colId,sectionId,cardId,inTop10); if(!card) return;
  const opts=PICKER_PLATFORMS.map(p=>{
    const sel=(card.platforms||[]).some(x=>x.id===p.id);
    return `<div class="streaming-option ${sel?'selected':''}" id="sopt-${p.id}" onclick="togglePlatform('${p.id}','${escHtml(p.name)}','${p.logo}')">
      <img src="${p.logo}" alt="${p.name}"><span>${p.name}</span></div>`;
  }).join('');
  showModal(`
    <button class="modal-close-x" onclick="closeModal()">✕</button>
    <h2>¿Dónde se puede ver?</h2>
    <div class="streaming-picker">${opts}</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="savePlatforms('${colId}','${sectionId}','${cardId}',${inTop10})">Guardar</button>
    </div>`);
  window._editPlats=JSON.parse(JSON.stringify(card.platforms||[]));
}
function togglePlatform(pid,name,logo){
  const arr=window._editPlats, idx=arr.findIndex(x=>x.id===pid);
  if(idx>-1) arr.splice(idx,1); else arr.push({id:pid,name,logo});
  document.getElementById('sopt-'+pid)?.classList.toggle('selected',arr.some(x=>x.id===pid));
}
function savePlatforms(colId,sectionId,cardId,inTop10){
  const card=getCard(colId,sectionId,cardId,inTop10);
  if(card) card.platforms=[...window._editPlats];
  closeModal(); renderAll();
}

// ── MODALS ────────────────────────────────────────────────────────────────
function showModal(html, extraCls=''){ document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="overlayClose(event)"><div class="modal-box ${extraCls}">${html}</div></div>`; }
function closeModal(){ document.getElementById('modal-container').innerHTML=''; }
function overlayClose(e){ if(e.target.classList.contains('modal-overlay')) closeModal(); }

// ── RENDER ────────────────────────────────────────────────────────────────
function renderAll(){
  const container=document.getElementById('columns-container');
  container.querySelectorAll('.genre-column').forEach(el=>el.remove());
  const addBtn=document.getElementById('add-col-btn');
  state.columns.forEach(col=>{
    const el=document.createElement('div');
    el.className='genre-column'; el.dataset.colId=col.id;
    el.innerHTML=renderColumn(col);
    container.insertBefore(el,addBtn);
  });
  setupDrag();
  renderFilterBar();
  scheduleSave();
}

function renderColumn(col){
  const isFirst=state.columns[0]?.id===col.id;
  const isLast=state.columns[state.columns.length-1]?.id===col.id;
  // Render top10 rows — each row max 5, add-btn always separate row
  const top10rows=chunkArray(col.top10,5);
  let top10Html='';
  if(col.top10.length===0){
    top10Html=`<div class="card-row" data-col="${col.id}" data-zone="top10" data-rowri="0">
      <div class="add-card" onclick="openSearchModal('${col.id}','',true)">+<span>Añadir</span></div></div>`;
  } else {
    const lastT10Full=top10rows[top10rows.length-1].length===5;
    top10Html=top10rows.map((row,ri)=>{
      const zone=ri===0?'top10':'top10b';
      const isLast=ri===top10rows.length-1;
      const addBtn=isLast&&!lastT10Full&&col.top10.length<10?`<div class="add-card" onclick="openSearchModal('${col.id}','',true)">+<span>Añadir</span></div>`:'';
      return `<div class="card-row" data-col="${col.id}" data-zone="${zone}" data-rowri="${ri}">${row.map((card,ci)=>renderCard(card,col.id,null,true,ri*5+ci)).join('')}${addBtn}</div>`;
    }).join('');
    if(lastT10Full&&col.top10.length<10){
      const zone=top10rows.length===1?'top10':'top10b';
      top10Html+=`<div class="card-row" data-col="${col.id}" data-zone="${zone}" data-rowri="${top10rows.length}"><div class="add-card" onclick="openSearchModal('${col.id}','',true)">+<span>Añadir</span></div></div>`;
    }
  }
  return `
    <div class="col-inner">
      <div class="col-header" draggable="true" data-col-drag="${col.id}">
        <div class="col-title-row">
          <span class="col-drag-handle" title="Arrastrar para reordenar">⠿</span>
          <span class="col-title">${escHtml(col.name)}</span>
          <button class="col-rename-btn" onclick="renameColumn('${col.id}')" title="Renombrar">✎</button>
        </div>
        <button class="col-delete-btn" onclick="confirmDeleteCol('${col.id}')">✕</button>
      </div>
      <div class="combined-card">
        <div class="top10-section" style="background:${col.sections[0]?.bgColor||'transparent'}">
          <div class="top10-title">TOP 10 ${escHtml(col.name).toUpperCase()} <span class="badge">TO WATCH</span></div>
          ${top10Html}
        </div>
        <div class="card-divider"></div>
        ${col.sections.map((sec,si)=>`
          ${si>0?'<div class="sec-divider"></div>':''}
          ${renderSection(sec,col.id)}
        `).join('')}
        <div class="add-section-row" style="background:${col.sections[col.sections.length-1]?.bgColor||'transparent'};padding-top:0">
          <button class="add-section-btn" onclick="addSection('${col.id}')">+ Nueva subsección</button>
        </div>
      </div>
    </div>`;
}

function renderSection(sec,colId){
  const rows=chunkArray(sec.cards,5);
  const lastFull=rows.length>0&&rows[rows.length-1].length===5;
  let html;
  if(rows.length===0){
    html=`<div class="card-row" data-col="${colId}" data-sec="${sec.id}" data-zone="grid" data-rowri="0"><div class="add-card" onclick="openSearchModal('${colId}','${sec.id}',false)">+<span>Añadir</span></div></div>`;
  } else {
    html=rows.map((row,ri)=>{
      const isLast=ri===rows.length-1;
      const addBtn=isLast&&!lastFull?`<div class="add-card" onclick="openSearchModal('${colId}','${sec.id}',false)">+<span>Añadir</span></div>`:'';
      return `<div class="card-row" data-col="${colId}" data-sec="${sec.id}" data-zone="grid" data-rowri="${ri}">${row.map(card=>renderCard(card,colId,sec.id,false)).join('')}${addBtn}</div>`;
    }).join('');
    if(lastFull){
      html+=`<div class="card-row" data-col="${colId}" data-sec="${sec.id}" data-zone="grid" data-rowri="${rows.length}"><div class="add-card" onclick="openSearchModal('${colId}','${sec.id}',false)">+<span>Añadir</span></div></div>`;
    }
  }
  return `<div class="genre-section" data-sec="${sec.id}" style="background:${sec.bgColor||'transparent'}">
    <div class="sec-header" draggable="true"
      data-sec-drag="${sec.id}" data-sec-col="${colId}"
      ondragstart="onSecDragStart(event,'${colId}','${sec.id}')"
      ondragover="onSecDragOver(event,'${colId}','${sec.id}')"
      ondrop="onSecDrop(event,'${colId}','${sec.id}')"
      ondragleave="onSecDragLeave(event)"
      style="cursor:grab">
      <span class="sec-drag-handle" title="Arrastrar para reordenar">⠿</span>
      <span class="sec-title">${escHtml(sec.name)}</span>
      <div class="sec-actions">
        <button class="sec-rename-btn" onclick="renameSection('${colId}','${sec.id}')" title="Renombrar / color">✎</button>
        <button class="sec-delete-btn" onclick="confirmDeleteSection('${colId}','${sec.id}')" title="Eliminar subsección">✕</button>
      </div>
    </div>
    ${html}
  </div>`;
}

function renderCard(card,colId,sectionId,inTop10,rank){
  const secId=sectionId||'', top10f=inTop10?'true':'false';

  // Empty slot — functional add card that replaces itself when filled
  if(card.isEmpty){
    return `<div class="media-card" data-card-id="${card.id}" data-col="${colId}" data-sec="${secId}" data-top10="${top10f}" draggable="true" style="cursor:grab">
      <button class="delete-btn" onclick="event.stopPropagation();doDelete('${colId}','${secId}','${card.id}',${top10f})">✕</button>
      <div class="card-img-wrap" style="border:2px dashed var(--border);border-radius:6px;background:#f8f6f3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;pointer-events:none">
        <span style="font-size:22px;color:#ccc;line-height:1;pointer-events:none">+</span>
        <span style="font-size:9px;font-weight:600;color:#bbb;pointer-events:none">Añadir</span>
      </div>
      <div style="position:absolute;inset:0;cursor:pointer;border-radius:6px" onclick="event.stopPropagation();fillEmptySlot('${colId}','${secId}','${card.id}',${top10f})"></div>
    </div>`;
  }

  const platforms=card.platforms||[];
  // Filter dimming
  const dimmed=hasActiveFilters()&&!cardMatchesFilters(card);

  // Platform pills
  let platHtml='';
  const clockSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
  const pendCls=card.pending?'active':'';
  const clockBtn=`<button class="pending-btn ${pendCls}" title="${card.pending?'Quitar pendiente':'Sin estrenar / pendiente'}" onclick="event.stopPropagation();togglePending('${colId}','${secId}','${card.id}',${top10f})">${clockSvg}</button>`;
  if(card.mediaType==='game'){
    // Games: show console platforms as plain pills, no streaming picker
    const allGplats=(card.gamePlatforms||[]);
    const gplats=allGplats.slice(0,3);
    const extraG=allGplats.length-3;
    const abbrev=p=>p.replace('Family Computer Disk System','FDS').replace('Family Computer','Famicom').replace('Nintendo Entertainment System','NES').replace('Super Nintendo Entertainment System','SNES').replace('Nintendo 64','N64').replace('Nintendo Switch','Switch').replace('Nintendo 3DS','3DS').replace('Nintendo DS','DS').replace('Game Boy Advance','GBA').replace('Game Boy Color','GBC').replace('PlayStation 5','PS5').replace('PlayStation 4','PS4').replace('PlayStation 3','PS3').replace('PlayStation 2','PS2').replace('PlayStation Portable','PSP').replace('Xbox Series X|S','Xbox SX').replace('PC (Microsoft Windows)','PC');
    if(gplats.length){
      const morePill=extraG>0?`<span class="platform-pill platform-pill-more" style="cursor:pointer;background:#6b7280;color:#fff;font-weight:700;border-color:#6b7280" title="${escHtml(allGplats.slice(3).map(abbrev).join(', '))}" onclick="event.stopPropagation();showAllPlatforms('${colId}','${secId}','${card.id}',${top10f})">+${extraG}</span>`:'';
      platHtml=gplats.map(p=>`<span class="platform-pill" style="cursor:default" title="${escHtml(p)}"><span>${escHtml(abbrev(p))}</span></span>`).join('')+morePill+clockBtn;
    } else {
      platHtml=clockBtn;
    }
  } else if(platforms.length){
    platHtml=platforms.map(p=>{
      const logo=p.logo?`<img src="${p.logo}" alt="">`:''
      return `<span class="platform-pill" onclick="event.stopPropagation();openStreamingPicker('${colId}','${secId}','${card.id}',${top10f})" title="${escHtml(p.name)}">${logo}<span>${escHtml(p.name)}</span></span>`;
    }).join('')+clockBtn;
  } else {
    platHtml=`<span class="add-platform-pill" onclick="event.stopPropagation();openStreamingPicker('${colId}','${secId}','${card.id}',${top10f})">+ dónde ver</span>${clockBtn}`;
  }

  // Meta line
  let metaStr=escHtml(card.year||'');
  let extraInfo='';
  const noMeta=!card.runtime&&!card.seasons&&!card.ttbMain&&card.tmdbId;

  if(card.mediaType==='game'){
    metaStr+=` · <a href="https://howlongtobeat.com/?q=${encodeURIComponent(card.title||'')}" target="_blank" onclick="event.stopPropagation()" style="text-decoration:none;vertical-align:middle;display:inline-flex;align-items:center;gap:3px;background:transparent;color:#1a1a1a;font-size:8px;font-weight:700;letter-spacing:.4px;padding:2px 5px;border-radius:3px;line-height:1;border:1px solid #1a1a1a" title="Ver en HowLongToBeat"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>HLTB</a>`;
  } else {
    if(card.runtime) metaStr+=` · ${card.runtime} min`;
    else if(card.seasons) metaStr+=` · ${card.seasons} temp.`;
  }

  let typeBadge='';
  if(card.mediaType==='game') typeBadge='<span class="card-type-badge game">JUEGO</span>';
  // FIN badge removed — use filter 'Terminadas' instead
  const rankHtml=inTop10?`<div class="rank-num">${rank+1}</div>`:'';
  const pendingOverlay=card.pending?`<div class="pending-label">PENDIENTE</div>`:'';
  const pendingCls=card.pending?'pending':'';

  const cardCls=[pendingCls,dimmed?'filter-dim':''].filter(Boolean).join(' ');
  return `<div class="media-card ${cardCls}" draggable="true"
    data-card-id="${card.id}" data-col="${colId}" data-sec="${secId}" data-top10="${top10f}">
    <button class="delete-btn" onclick="event.stopPropagation();showInlineDelete(this,'${colId}','${secId}','${card.id}',${top10f})">✕</button>
    <div class="card-img-wrap">
      ${card.poster
        ? `<img src="${escHtml(card.poster)}" alt="${escHtml(card.title)}" loading="lazy">`
        : `<div style="width:100%;height:100%;background:#d1cdc7;border-radius:6px;display:flex;align-items:center;justify-content:center;padding:8px;text-align:center">
            <span style="font-size:11px;font-weight:700;color:#555;line-height:1.3;word-break:break-word">${escHtml(card.title)}</span>
           </div>`
      }
      ${rankHtml}
      ${pendingOverlay}
      ${showRatings&&card.rating!=null?`<div class="card-rating"><svg width="13" height="13" viewBox="0 0 24 24" fill="#f59e0b" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${card.rating}</div>`:''}
      <button class="card-menu-btn" onclick="event.stopPropagation();openCardMenu(event,'${colId}','${secId}','${card.id}',${top10f})"><span></span><span></span><span></span></button>
    </div>
    <div class="card-info">
      ${typeBadge}
      <div class="card-title">${escHtml(card.title)}</div>
      <div class="card-meta">${metaStr}${noMeta?` <button onclick="event.stopPropagation();reloadMeta('${colId}','${secId}','${card.id}',${top10f})" style="background:none;border:none;cursor:pointer;color:#aaa;font-size:10px;padding:0;line-height:1;" title="Cargar duración">↻</button>`:''}</div>
      
      ${extraInfo}
      <div class="card-platforms" style="${showPlatforms?'':' display:none'}">${platHtml}</div>
    </div>
  </div>`;
}


function filterTitleSearch(query){
  const q=query.toLowerCase().trim();
  document.querySelectorAll('.media-card').forEach(el=>{
    const title=el.querySelector('.card-title')?.textContent?.toLowerCase()||'';
    if(!q){ el.classList.remove('filter-dim'); return; }
    if(title.includes(q)) el.classList.remove('filter-dim');
    else el.classList.add('filter-dim');
  });
}

function chunkArray(arr,size){
  const out=[];
  for(let i=0;i<arr.length;i+=size) out.push(arr.slice(i,i+size));
  return out;
}

async function reloadMeta(colId,secId,cardId,inTop10){
  const col=state.columns.find(c=>c.id===colId); if(!col) return;
  const card=inTop10?col.top10.find(x=>x.id===cardId):col.sections.find(s=>s.id===secId)?.cards.find(x=>x.id===cardId);
  if(!card||!card.tmdbId) return;
  const details=await fetchDetails(card.tmdbId,card.mediaType);
  if(details){
    if(card.mediaType==='tv'&&details.seasons) card.seasons=details.seasons;
    if(card.mediaType==='tv'&&details.ended!==undefined) card.ended=details.ended;
    if(details.rating!==undefined&&details.rating!==null) card.rating=details.rating;
    if(card.mediaType==='movie'&&details.runtime) card.runtime=details.runtime;
    if(details.genres) card.genres=details.genres;
  }
  renderAll();
}

  if(top+120>window.innerHeight) top=window.innerHeight-130;

function openMoveModal(colId, secId, cardId, inTop10){
  const card=getCard(colId,secId,cardId,inTop10); if(!card) return;
  // Build list of all sections grouped by column
  let html='';

    colSections.push({colId:col.id, secId:'__top10__', label:'Top 10 '+col.name, current:isCurrentTop10});
    col.sections.forEach(sec=>{

function moveCardTo(srcColId, srcSecId, cardId, inTop10, tgtColId, tgtSecId){
  const srcCol=state.columns.find(c=>c.id===srcColId); if(!srcCol) return;
  let card;
  if(inTop10){ card=srcCol.top10.find(x=>x.id===cardId); srcCol.top10=srcCol.top10.filter(x=>x.id!==cardId); }
  else { const s=srcCol.sections.find(s=>s.id===srcSecId); if(!s) return; card=s.cards.find(x=>x.id===cardId); s.cards=s.cards.filter(x=>x.id!==cardId); }
  if(!card) return;
  const tgtCol=state.columns.find(c=>c.id===tgtColId); if(!tgtCol) return;
  if(tgtSecId==='__top10__'){
    if(tgtCol.top10.length<10) tgtCol.top10.push(card); else { showToast('Top 10 lleno'); return; }
  } else {
    const tgtSec=tgtCol.sections.find(s=>s.id===tgtSecId); if(tgtSec) tgtSec.cards.push(card);
  }
  renderAll(); showToast('Movido ✓');
}


function fillEmptySlot(colId, secId, cardId, inTop10){

  window._fillSlotTarget={colId, secId, cardId, inTop10};

function insertEmptySlot(colId, secId, cardId, inTop10){
  // Insert an empty placeholder card immediately to the right of the target card
  const emptyCard={
    id:uid(), title:'', year:'', poster:'', platforms:[], genres:[],
    pending:false, mediaType:'empty', isEmpty:true
  };
  const col=state.columns.find(c=>c.id===colId); if(!col) return;
  if(inTop10){
    const idx=col.top10.findIndex(x=>x.id===cardId);
    if(col.top10.length>=10){showToast('Top 10 lleno');return;}
    col.top10.splice(idx+1,0,emptyCard);
  } else {
    const sec=col.sections.find(s=>s.id===secId); if(!sec) return;
    const idx=sec.cards.findIndex(x=>x.id===cardId);
    sec.cards.splice(idx+1,0,emptyCard);
  }
  renderAll(); showToast('Hueco añadido ✓');
}

// ── RELOAD ALL METADATA ───────────────────────────────────────────────────
async function reloadAllMeta(){
  const key=getKey(); if(!key){ showToast('⚠️ Necesitas la API Key de TMDB'); return; }
  // Collect all cards
  const tmdbCards=[], gameCards=[];
  state.columns.forEach(col=>{
    const all=[...col.top10,...col.sections.flatMap(s=>s.cards)];
    all.forEach(card=>{
      if(card.mediaType==='empty'||card.isManual) return;
      if(card.mediaType==='game') gameCards.push(card);
      else if(card.tmdbId) tmdbCards.push(card);
    });
  });
  const total=tmdbCards.length+gameCards.length;
  if(!total){ showToast('Sin títulos que actualizar'); return; }
  showToast('Recargando '+total+' títulos…');
  setSyncStatus('syncing','Actualizando…');
  let done=0;

  // TMDB cards in batches of 3
  for(let i=0;i<tmdbCards.length;i+=3){
    await Promise.all(tmdbCards.slice(i,i+3).map(async card=>{
      const details=await fetchDetails(card.tmdbId, card.mediaType);
      if(details){
        if(card.mediaType==='tv'&&details.seasons) card.seasons=details.seasons;
        if(card.mediaType==='movie'&&details.runtime) card.runtime=details.runtime;
        if(details.genres?.length) card.genres=details.genres;
        if(details.rating!==undefined&&details.rating!==null) card.rating=details.rating;
        if(card.mediaType==='tv'&&details.ended!==undefined) card.ended=details.ended;
      }
      done++;
    }));
    if(i+3<tmdbCards.length) await new Promise(r=>setTimeout(r,300));
  }



  renderAll();
  saveBoard();
  showToast('✓ Actualizados '+done+' títulos');
  setSyncStatus('synced','Guardado ✓');
}

async function testIGDB(){

  const log=(msg,color='#333')=>{
    const p=document.getElementById('test-log');
    if(p) p.innerHTML+='\n<span style="color:'+color+'">'+msg+'</span>';

  // Step 1: Twitch token
  log('1. Obteniendo token de Twitch…','#888');

    } else {
      log('   ❌ Sin token: '+JSON.stringify(d),'red');
      return;
    }
  }catch(e){
    log('   ❌ Error Twitch: '+e.message,'red');
  }

  // Step 2: Edge Function
  log('\n2. Probando Edge Function Supabase…','#888');
  log('   URL: '+SB_IGDB_PROXY,'#555');
  try{
    const r=await fetch(SB_IGDB_PROXY,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':(localStorage.getItem('mediaboard_sb_anon')||SB_KEY),'Authorization':'Bearer '+(localStorage.getItem('mediaboard_sb_anon')||SB_KEY)},
      body:JSON.stringify({endpoint:'games',body:'search "zelda"; fields name; limit 2;',clientId,clientSecret})
    });
    log('   HTTP status: '+r.status+(r.ok?' ✅':' ❌'),'#333');
    const text=await r.text();
    log('   Respuesta: '+text.slice(0,200),'#333');
    if(r.ok){
      try{
        const data=JSON.parse(text);
        if(Array.isArray(data)&&data.length){
          log('   ✅ IGDB funciona! Ejemplo: '+data[0].name,'#2d6a4f');
        } else {
          log('   ⚠️ Respuesta vacía o inesperada','orange');
        }
      }catch(e){ log('   ⚠️ No es JSON válido','orange'); }
    }
  }catch(e){
    log('   ❌ Error Edge Function: '+e.message,'red');

  // Step 3: Direct IGDB (will likely fail — that's expected)

  }catch(e){
    log('   <span style="color:#aaa">✗ Bloqueado por CORS — normal y esperado desde GitHub Pages ✅</span>');
  }

  // Step 4: probe available fields on a known game
  log('\n4. Campos disponibles en juego (Zelda id=1022)…','#888');
  try{
    const anonKey=localStorage.getItem('mediaboard_sb_anon')||SB_KEY;

    });
    const d=await r.json();
    if(Array.isArray(d)&&d[0]){
      const keys=Object.keys(d[0]).join(', ');
      log('   Campos: '+keys,'#555');
    }
  }catch(e){ log('   ❌ '+e.message,'red'); }

  log('\n— Diagnóstico completo —','#888');
}

// ── SECTION DRAG & DROP ───────────────────────────────────────────────────
let _secDragColId=null, _secDragSecId=null;

function onSecDragStart(e, colId, secId){
  _secDragColId=colId; _secDragSecId=secId;
  e.stopPropagation();
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>e.target.closest('.genre-section')?.classList.add('dragging-col'),0);
}
function onSecDragOver(e, colId, secId){
  if(!_secDragSecId) return;
  e.preventDefault(); e.stopPropagation();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.genre-section').forEach(el=>el.classList.remove('sec-drop-target'));
  e.target.closest('.genre-section')?.classList.add('sec-drop-target');
}
function onSecDragLeave(e){
  e.target.closest('.genre-section')?.classList.remove('sec-drop-target');
}
function onSecDrop(e, colId, secId){
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.genre-section').forEach(el=>el.classList.remove('sec-drop-target','dragging-col'));
  if(!_secDragSecId||_secDragSecId===secId) return;

  const srcCol=state.columns.find(c=>c.id===_secDragColId);
  const tgtCol=state.columns.find(c=>c.id===colId);
  if(!srcCol||!tgtCol) return;

  const fromIdx=srcCol.sections.findIndex(s=>s.id===_secDragSecId);
  if(fromIdx<0) return;
  const [moved]=srcCol.sections.splice(fromIdx,1);

  // Ensure source col always has at least one section
  if(srcCol.sections.length===0){
    srcCol.sections.push({id:uid(),name:srcCol.name,cards:[],bgColor:''});
  }

  const toIdx=tgtCol.sections.findIndex(s=>s.id===secId);
  tgtCol.sections.splice(toIdx>=0?toIdx:tgtCol.sections.length, 0, moved);

  _secDragColId=null; _secDragSecId=null;
  renderAll();
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── DRAG & DROP ───────────────────────────────────────────────────────────
let dragCard=null, dragColId=null;
let dropLineEl=null, dropTargetRow=null, dropInsertIdx=null;

function setupDrag(){
  document.querySelectorAll('.media-card').forEach(el=>{
    el.addEventListener('dragstart',onCardDragStart);
    el.addEventListener('dragend',onCardDragEnd);
  });
  document.querySelectorAll('.card-row').forEach(row=>{
    row.addEventListener('dragover',onRowDragOver);
    row.addEventListener('dragleave',onRowDragLeave);
    row.addEventListener('drop',onRowDrop);
  });
  document.querySelectorAll('.col-header[data-col-drag]').forEach(hdr=>{
    hdr.addEventListener('dragstart',onColDragStart);
    hdr.addEventListener('dragend',onColDragEnd);
  });
  document.querySelectorAll('.genre-column').forEach(col=>{
    col.addEventListener('dragover',onColDragOver);
    col.addEventListener('dragleave',onColDragLeave);
    col.addEventListener('drop',onColDrop);
  });
}

function onCardDragStart(e){
  dragCard={colId:this.dataset.col,sectionId:this.dataset.sec,cardId:this.dataset.cardId,inTop10:this.dataset.top10==='true'};
  e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('type','card');
  setTimeout(()=>this.classList.add('dragging'),0);
  e.stopPropagation();
}
function onCardDragEnd(){ this.classList.remove('dragging'); dragCard=null; clearDropLine(); }

function clearDropLine(){
  if(dropLineEl){dropLineEl.remove();dropLineEl=null;}
  dropTargetRow=null; dropInsertIdx=null;
}
function onRowDragOver(e){
  if(!dragCard) return; e.preventDefault(); e.stopPropagation();
  const row=this;
  const cards=[...row.querySelectorAll('.media-card')];
  let insertIdx=cards.length;
  for(let i=0;i<cards.length;i++){
    const rect=cards[i].getBoundingClientRect();
    if(e.clientX<rect.left+rect.width/2){insertIdx=i;break;}
  }
  if(dropTargetRow===row&&dropInsertIdx===insertIdx) return;
  clearDropLine();
  dropTargetRow=row; dropInsertIdx=insertIdx;
  const line=document.createElement('div'); line.className='drop-line'; dropLineEl=line;
  if(insertIdx>=cards.length){
    const addCard=row.querySelector('.add-card');
    if(addCard) row.insertBefore(line,addCard); else row.appendChild(line);
  } else { row.insertBefore(line,cards[insertIdx]); }
}
function onRowDragLeave(e){ if(!dragCard) return; if(!this.contains(e.relatedTarget)) clearDropLine(); }
function onRowDrop(e){
  e.preventDefault(); e.stopPropagation();
  if(!dragCard) return;
  const row=this, tColId=row.dataset.col, tSecId=row.dataset.sec||'';
  const zone=row.dataset.zone, inTop10Target=zone==='top10'||zone==='top10b';
  const insertAt=dropInsertIdx??99;
  clearDropLine();
  const srcCol=state.columns.find(c=>c.id===dragCard.colId); if(!srcCol) return;
  let srcCard;
  if(dragCard.inTop10){
    srcCard=srcCol.top10.find(c=>c.id===dragCard.cardId);
    srcCol.top10=srcCol.top10.filter(c=>c.id!==dragCard.cardId);
  } else {
    const srcSec=srcCol.sections.find(s=>s.id===dragCard.sectionId); if(!srcSec) return;
    srcCard=srcSec.cards.find(c=>c.id===dragCard.cardId);
    srcSec.cards=srcSec.cards.filter(c=>c.id!==dragCard.cardId);
  }
  if(!srcCard) return;
  const tCol=state.columns.find(c=>c.id===tColId); if(!tCol) return;
  if(inTop10Target){
    if(tCol.top10.length>=10){showToast('Top 10 lleno');return;}
    const absIdx=Math.min(insertAt+(zone==='top10b'?5:0),tCol.top10.length);
    tCol.top10.splice(absIdx,0,srcCard);
  } else {
    const tSec=tCol.sections.find(s=>s.id===tSecId); if(!tSec) return;
    const rowIdx=parseInt(row.dataset.rowri||'0');
    const absIdx=Math.min(rowIdx*5+insertAt,tSec.cards.length);
    tSec.cards.splice(absIdx,0,srcCard);
  }
  dragCard=null; renderAll();
}
// ── Column drag with vertical red line indicator ──
let colDropLineEl=null, colDropTarget=null, colDropBefore=null;

function onColDragStart(e){
  dragColId=this.dataset.colDrag;
  e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('type','col');
  setTimeout(()=>this.closest('.genre-column')?.classList.add('dragging-col'),0);
}
function onColDragEnd(){
  this.closest('.genre-column')?.classList.remove('dragging-col');
  clearColDropLine(); dragColId=null;
}
function clearColDropLine(){
  if(colDropLineEl){
    if(colDropLineEl.parentNode) colDropLineEl.parentNode.removeChild(colDropLineEl);
    colDropLineEl=null;
  }
  colDropTarget=null; colDropBefore=null;
}
function onColDragOver(e){
  if(!dragColId||dragCard) return; e.preventDefault(); e.stopPropagation();
  const col=this;
  if(col.dataset.colId===dragColId){ clearColDropLine(); return; }
  const rect=col.getBoundingClientRect();
  const center=rect.left+rect.width/2;
  const DEAD=40;
  if(e.clientX>center-DEAD&&e.clientX<center+DEAD) return;
  const before=e.clientX<center;
  if(colDropTarget===col&&colDropBefore===before) return;
  // Position fixed line — no DOM insertion into container, no layout shift
  if(!colDropLineEl){
    const line=document.createElement('div'); line.className='col-drop-line';
    document.body.appendChild(line); colDropLineEl=line;
  }
  colDropTarget=col; colDropBefore=before;
  if(!colDropLineEl){
    const line=document.createElement('div'); line.className='col-drop-line';
    document.body.appendChild(line); colDropLineEl=line;
  }
  // Position: from canvas-wrapper top to bottom of viewport
  const canvasTop=document.getElementById('canvas-wrapper')?.getBoundingClientRect().top||92;
  colDropLineEl.style.top=canvasTop+'px';
  colDropLineEl.style.bottom='0';
  const x=before?rect.left-2:rect.right-1;
  colDropLineEl.style.left=x+'px';
}
function onColDragLeave(e){
  if(!dragColId) return;
  if(!this.contains(e.relatedTarget)) clearColDropLine();
}
function onColDrop(e){
  e.preventDefault(); e.stopPropagation();
  if(!dragColId||dragCard) return;
  const tCol=this; const before=colDropBefore;
  clearColDropLine();
  const tId=tCol.dataset.colId; if(!tId||tId===dragColId){ clearColDropLine(); dragColId=null; return; }
  const fi=state.columns.findIndex(c=>c.id===dragColId);
  let ti=state.columns.findIndex(c=>c.id===tId);
  if(fi<0||ti<0) return;
  const [m]=state.columns.splice(fi,1);
  ti=state.columns.findIndex(c=>c.id===tId); // recalculate after splice
  state.columns.splice(before?ti:ti+1,0,m);
  dragColId=null; renderAll();
}


// ── EXPORT / IMPORT JSON ──────────────────────────────────────────────────
function exportJSON(){
  const data=JSON.stringify(state,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download='mediaboard_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('Exportado ✓');
}
function importJSON(){
  document.getElementById('import-file-input').click();
}
function handleImportFile(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const imported=JSON.parse(e.target.result);
      if(!imported.columns) throw new Error('Formato inválido');
      state=imported;
      scheduleSave();
      renderAll();
      showToast('Importado ✓ ('+state.columns.length+' secciones)');
    }catch(err){ showToast('❌ Error al importar: '+err.message); }
    input.value='';
  };
  reader.readAsText(file);
}
